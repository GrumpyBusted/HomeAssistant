- id: "1737313921011"
  alias: Gang varme
  description: |
    Automatik til at styre varmen i gangen
  mode: restart
  trace:
    stored_traces: 50

  triggers:
    - trigger: state
      entity_id: binary_sensor.someone_home

    - trigger: state
      entity_id: sensor.hallway_target_temperature
      id: target_changed

    - trigger: state
      entity_id: timer.hallway_heating_manual_timer
      to: idle

    - trigger: state
      entity_id: sensor.hallway_desired_temperature

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.someone_home
              state: "off"
            - condition: state
              entity_id: timer.hallway_heating_manual_timer
              state: active
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.hallway_heating_manual_timer

        - conditions:
            - condition: trigger
              id: target_changed
            - condition: template
              value_template: |-
                {{ states('sensor.hallway_target_temperature') | float(0.0) != states('sensor.hallway_desired_temperature') | float(21.0) }}
          sequence:
            - action: timer.start
              data:
                duration: 00:30:00
              target:
                entity_id: timer.hallway_heating_manual_timer

        - conditions:
            - condition: template
              value_template: |-
                {{ states('sensor.hallway_target_temperature') | float(0.0) == states('sensor.hallway_desired_temperature') | float(21.0) }}
            - condition: state
              entity_id: timer.hallway_heating_manual_timer
              state: active
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.hallway_heating_manual_timer

    - if:
        - condition: state
          entity_id: timer.hallway_heating_manual_timer
          state: idle
      then:
        - action: script.set_climate_temperature
          data:
            temperature: "{{ states('sensor.hallway_desired_temperature') | float(21.0) }}"
            entities:
              - climate.hallway_radiator_thermostat
            target_sensor: sensor.hallway_target_temperature
