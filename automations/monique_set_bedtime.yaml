- id: "1740422421448"
  alias: Monique sæt sengetid
  description: |
    Sæt sengetid input hjælper for Monique, når webhook er kaldt
  mode: restart
  trace:
    stored_traces: 10

  triggers:
    - trigger: webhook
      allowed_methods:
        - POST
      local_only: false
      webhook_id: monique-set-bedtime-CNwYS0I0HIbgeRZ1GmGOxxvS

  conditions: []

  actions:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.monique_bedtime_alarm
      data:
        datetime: "{{ now() + timedelta(seconds=10) }}"
