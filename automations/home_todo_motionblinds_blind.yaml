- id: D825846F-3020-43C4-876A-D3FCF92B49BA
  alias: Hjem todo Motionblinds rullegardiner
  description: |
    Kontroller batteri status på Motionblinds rullegardiner
  mode: restart
  trace:
    stored_traces: 30

  triggers:
    - trigger: numeric_state
      entity_id:
        - sensor.emils_room_blind_battery
      below: 5
      for: 00:03:00

    - trigger: numeric_state
      entity_id:
        - sensor.emils_room_blind_battery
      above: 70
      for: 00:03:00

    - trigger: time
      at: 03:09:00

  conditions: []

  actions:
    - variables:
        sensors:
          - entity_id: sensor.emils_room_blind_battery
            battery_type: Genopladelig batteri med USB-C
    - repeat:
        for_each: "{{ sensors }}"
        sequence:
          - action: script.create_todo_battery_task
            data:
              entity_id: "{{ repeat.item.entity_id }}"
              type: "{{ repeat.item.battery_type | default('') }}"
              threshold: 5
