- id: '1760882456215'
  alias: Have lys hus øst
  description: Automatik til at styre lys i haven på øst siden af huset
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.garden_house_east_presence
    from: 'off'
    to: 'on'
    id: detected_east
  - trigger: state
    entity_id:
    - binary_sensor.garden_house_east_presence
    from: 'on'
    to: 'off'
    id: cleared_east
  - trigger: state
    entity_id:
    - binary_sensor.driveway_entrance_presence
    from: 'off'
    to: 'on'
    id: detected_entrance
  - trigger: state
    entity_id:
    - binary_sensor.driveway_entrance_presence
    from: 'on'
    to: 'off'
    id: cleared_entrance
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - detected_east
        - detected_entrance
      - condition: state
        entity_id: binary_sensor.home_outside_light
        state: 'off'
      sequence:
      - action: light.turn_on
        metadata: {}
        data:
          brightness_pct: 100
          color_temp_kelvin: 2700
          transition: 1
        target:
          entity_id:
          - light.garden_light_house_east
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - cleared_east
          - cleared_entrance
        - condition: state
          entity_id: binary_sensor.garden_house_east_presence
          state: 'off'
        - condition: state
          entity_id: binary_sensor.driveway_entrance_presence
          state: 'off'
      sequence:
      - action: light.turn_off
        metadata: {}
        data:
          transition: 1
        target:
          entity_id:
          - light.garden_light_house_east
  mode: queued
  max: 10
  trace:
    stored_traces: 20
