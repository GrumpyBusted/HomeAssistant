- id: "1737311363654"
  alias: Badeværelse varme
  description: Automatik til at styre varmen på badeværelset
  mode: restart
  trace:
    stored_traces: 50

  triggers:
    - trigger: state
      entity_id: binary_sensor.someone_home

    - trigger: state
      entity_id: sensor.bathroom_target_temperature
      id: target_changed

    - trigger: state
      entity_id: timer.bathroom_heating_manual_timer
      to: idle

    - trigger: state
      entity_id: sensor.bathroom_desired_temperature

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.someone_home
              state: "off"
            - condition: state
              entity_id: timer.bathroom_heating_manual_timer
              state: active
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.bathroom_heating_manual_timer

        - conditions:
            - condition: trigger
              id: target_changed
            - condition: template
              value_template: "{{ states('sensor.bathroom_target_temperature') | float(0.0) != states('sensor.bathroom_desired_temperature') | float(21.0) }}"
          sequence:
            - action: timer.start
              target:
                entity_id: timer.bathroom_heating_manual_timer
              data:
                duration: "00:15:00"

        - conditions:
            - condition: template
              value_template: "{{ states('sensor.bathroom_target_temperature') | float(0.0) == states('sensor.bathroom_desired_temperature') | float(21.0) }}"
            - condition: state
              entity_id: timer.bathroom_heating_manual_timer
              state: active
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.bathroom_heating_manual_timer

    - if:
        - condition: state
          entity_id: timer.bathroom_heating_manual_timer
          state: idle
      then:
        - action: script.set_climate_temperature
          data:
            temperature: "{{ states('sensor.bathroom_desired_temperature') | float(21.0) }}"
            entities:
              - climate.bathroom_radiator_thermostat_floor
              - climate.bathroom_radiator_thermostat_wall
            target_sensor: sensor.bathroom_target_temperature
