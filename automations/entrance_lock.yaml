- id: "1735842629315"
  alias: Entre lås
  description: Automatik til at låse hoveddøren op og i baseret på hvem der er hjemme
  mode: queued
  max: 10
  trace:
    stored_traces: 100

  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.anders_home
      from: "off"
      to: "on"
      id: anders_home

    - trigger: state
      entity_id:
        - binary_sensor.monique_home
      from: "off"
      to: "on"
      id: monique_home

    - trigger: state
      entity_id:
        - binary_sensor.emil_home
      from: "off"
      to: "on"
      id: emil_home

    - trigger: state
      entity_id:
        - binary_sensor.charlie_home
      from: "off"
      to: "on"
      id: charlie_home

    - trigger: state
      entity_id:
        - binary_sensor.someone_home
      from: "on"
      to: "off"
      id: no_one_home

    - trigger: state
      entity_id:
        - binary_sensor.everyone_sleeping
      from: "off"
      to: "on"
      id: sleeping

    - trigger: state
      entity_id: select.bedroom_state
      to: wind_down
      id: bedroom_going_to_sleep

    - trigger: state
      entity_id:
        - timer.entrance_lock_timer
      to: idle
      id: auto_locking_expired

  conditions: []

  actions:
    - action: homeassistant.update_entity
      data:
        entity_id: lock.entrance_lock
    - delay:
        seconds: 3

    - choose:
        - conditions:
            - condition: trigger
              id:
                - anders_home
            - condition: state
              entity_id: lock.entrance_lock
              state: locked
          sequence:
            - action: lock.unlock
              data:
                code: "{{ states('sensor.yale_code_anders') }}"
              target:
                entity_id: lock.entrance_lock

        - conditions:
            - condition: trigger
              id:
                - monique_home
            - condition: state
              entity_id: lock.entrance_lock
              state: locked
          sequence:
            - action: lock.unlock
              data:
                code: "{{ states('sensor.yale_code_monique') }}"
              target:
                entity_id: lock.entrance_lock

        - conditions:
            - condition: trigger
              id:
                - emil_home
            - condition: state
              entity_id: lock.entrance_lock
              state: locked
          sequence:
            - action: lock.unlock
              data:
                code: "{{ states('sensor.yale_code_emil') }}"
              target:
                entity_id: lock.entrance_lock

        - conditions:
            - condition: trigger
              id:
                - charlie_home
            - condition: state
              entity_id: lock.entrance_lock
              state: locked
          sequence:
            - action: lock.unlock
              data:
                code: "{{ states('sensor.yale_code_charlie') }}"
              target:
                entity_id: lock.entrance_lock

        - conditions:
            - condition: or
              conditions:
                - condition: trigger
                  id:
                    - no_one_home
                    - sleeping
                    - bedroom_going_to_sleep
            - condition: state
              entity_id: lock.entrance_lock
              state:
                - unlocked
          sequence:
            - action: lock.lock
              target:
                entity_id: lock.entrance_lock
            - action: timer.start
              data:
                duration: 00:00:10
              target:
                entity_id: timer.entrance_lock_timer

        - conditions:
            - condition: trigger
              id:
                - auto_locking_expired
            - condition: state
              entity_id: lock.entrance_lock
              state:
                - unlocked
            - condition: state
              entity_id: binary_sensor.house_sitter_home
              state: "off"
          sequence:
            - action: script.push_notification
              data:
                type: critical
                title: Advarsel
                message: Hoveddøren kunne ikke låses automatisk!
                id: entrance_lock_auto_warning
                recipient: home
                persistent: false
