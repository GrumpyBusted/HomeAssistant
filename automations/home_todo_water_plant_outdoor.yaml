- id: home_todo_water_plant_outdoor
  alias: Hjem todo vanding udendørs
  description: |
    Opret todo opgaver vedrørende jordfugtighed måler og vanding af blomster udendørs
  mode: queued
  max: 10
  trace:
    stored_traces: 30

  triggers:
    - trigger: numeric_state
      entity_id:
        - sensor.patio_soil_moisture_sensor_moisture
      below: 40
      for: 00:03:00

    - trigger: numeric_state
      entity_id:
        - sensor.patio_soil_moisture_sensor_moisture
      above: 60

    - trigger: time
      at: 03:16:30

  conditions: []

  actions:
    - action: script.create_todo_task
      data:
        subject: Vand blomster på terrassen
        description: |-
          Jordfugtigheden i krukker på terrassen er ved at være lav. Målt til {{ states('sensor.patio_soil_moisture_sensor_moisture') | float(0) | round(0) }}%
        related_entity_id: sensor.patio_soil_moisture_sensor_moisture
        entity_id: todo.todo_smart_todo
        must_replace: true
        is_active: "{{ states('sensor.patio_soil_moisture_sensor_moisture') | float(50.0) < 40.0 }}"
