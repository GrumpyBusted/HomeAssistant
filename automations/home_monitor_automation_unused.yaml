- id: "1771052556655"
  alias: Hjem overvåg automation ubrugt
  description: |
    Overvåg automations som ikke har trigget inden for cutoff (default 7 dage med undtagelser
  mode: single
  trace:
    stored_traces: 50

  triggers:
    - trigger: time
      at: 04:02:00

  conditions: []

  actions:
    - variables:
        default_days: 7
        custom_days:
          automation.home_electricity_meter_save: 32
          automation.home_water_meter_save: 32
          automation.emils_room_blind_stop: 999
          automation.charlies_room_blind_stop: 999
          automation.bedroom_blind_stop: 999
          automation.garage_3d_printer: 9999
          automation.driveway_todo_mailbox: 9999
          automation.kitchen_fridge: 9999
          automation.living_room_tv: 9999
          automation.home_monitor_system: 9999
          automation.storage_light: 999
        offenders:
          "{% set ns = namespace(offenders=[]) %}\n{% for a in states.automation | list %}\n  {% set days = custom_days.get(a.entity_id, default_days) | int %}\n  {% set cutoff = now() - timedelta(days=days) %}\n  {% set last = state_attr(a.entity_id, 'last_triggered') %}\n\n  {% if last is none %}\n    {% set ns.offenders = ns.offenders + [dict(\n      automation_id=a.entity_id,\n      friendly_name=a.name,\n \     last_triggered='never',\n      days_since=999999,\n      cutoff_days=days\n \   )] %}\n  {% else %}\n    {% set last_dt = as_datetime(last) %}\n    {% set age_days = ((now() - last_dt).total_seconds() / 86400) %}\n\n    {% if last_dt < cutoff %}\n      {% set ns.offenders = ns.offenders + [dict(\n        automation_id=a.entity_id,\n \       friendly_name=a.name,\n        last_triggered=(last_dt | as_local).isoformat(),\n \       days_since=age_days | round(1),\n        cutoff_days=days\n      )] %}\n    {% endif %}\n  {% endif %}\n{% endfor %}\n{{ (ns.offenders | sort(attribute='days_since', reverse=true) | list) | to_json }}\n"
        offenders_obj: "{{ offenders | trim | from_json }}"
        message: |-
          count: {{ offenders_obj | count }}
          automations:
          {% for row in offenders_obj %}
            - automation_id: "{{ row.automation_id }}"
              friendly_name: "{{ row.friendly_name }}"
              last_triggered: "{{ row.last_triggered }}"
              days_since: {{ row.days_since }}
              cutoff_days: {{ row.cutoff_days }}
          {% endfor %}
    - if:
        - condition: template
          value_template: |-
            {{ offenders_obj | length > 0 }}
      then:
        - action: system_log.write
          data:
            level: warning
            message: "Automations ikke kørt indenfor cutoff: {{ message }}"
        - action: script.push_notification
          data:
            type: info
            recipient: none
            persistent: true
            id: home_assistant_monitor_automation_not_triggered
            title: "{{ offenders_obj | length }} automations har ikke kørt for nyligt"
            message: "{{ message }}"
