- id: technic_room_light
  alias: Teknikrum lys
  description: |
    Automatik til at styre lys i teknikrummet
  mode: queued
  max: 10
  trace:
    stored_traces: 30

  triggers:
    - trigger: state
      entity_id: binary_sensor.technic_room_door_sensor_door
      to: "on"
      id: opened

    - trigger: state
      entity_id: binary_sensor.technic_room_door_sensor_door
      to: "off"
      id: closed

    - trigger: state
      entity_id: binary_sensor.someone_home
      from: "on"
      to: "off"
      id: no_one_home

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: opened
          sequence:
            - action: light.turn_on
              target:
                entity_id:
                  - light.technic_room_lights
              data:
                transition: 1
                brightness_pct: 100
                color_temp_kelvin: 3000

        - conditions:
            - condition: trigger
              id:
                - closed
                - no_one_home
          sequence:
            - action: light.turn_off
              target:
                entity_id:
                  - light.technic_room_lights
              data:
                transition: 1
