- id: "1739647490572"
  alias: Soveværelse blæser
  description: |
    Tænder for Dyson Hot+Cool i soveværelset, for at varme hurtigere op hvis den ønskede temperatur 
    er væsentligt koldere end den aktuelle.
  mode: queued
  max: 10
  trace:
    stored_traces: 50

  triggers:
    - trigger: state
      entity_id: sensor.bedroom_air_purifier_mode

    - trigger: state
      entity_id: binary_sensor.parent_home

    - trigger: state
      entity_id: input_boolean.house_sitter

    - trigger: numeric_state
      entity_id: sensor.bedroom_air_quality_score
      above: 50

    - trigger: numeric_state
      entity_id: sensor.bedroom_air_quality_score
      below: 50

    - trigger: state
      entity_id: binary_sensor.bedroom_window
      to: "on"
      id: window_opened

    - trigger: state
      entity_id: binary_sensor.bedroom_window
      to: "off"
      id: window_closed

    - trigger: state
      entity_id: timer.bedroom_air_purifier_timer
      to: idle
      id: timeout

    - trigger: state
      entity_id: select.bedroom_state

  conditions: []

  actions:
    - variables:
        mode: "off"
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.parent_home
              state: "off"
            - condition: state
              entity_id: input_boolean.house_sitter
              state: "off"
          sequence: []

        - conditions:
            - condition: trigger
              id: window_opened
          sequence:
            - variables:
                mode: fan
            - action: timer.start
              target:
                entity_id: timer.bedroom_air_purifier_timer
              data:
                duration: "00:10:00"

        - conditions:
            - condition: trigger
              id: window_closed
            - condition: state
              entity_id: timer.bedroom_air_purifier_timer
              state: active
          sequence:
            - variables:
                mode: "off"
            - action: timer.cancel
              target:
                entity_id: timer.bedroom_air_purifier_timer

        - conditions:
            - condition: state
              entity_id: sensor.bedroom_air_purifier_mode
              state: heat
            - condition: state
              entity_id: binary_sensor.bedroom_window_sensor_door
              state: "off"
            - condition: state
              entity_id: select.bedroom_state
              state:
                - wake_up
                - sleeping
                - wind_down
                - occupied
                - empty
          sequence:
            - variables:
                mode: heat

        - conditions:
            - condition: state
              entity_id: sensor.bedroom_air_purifier_mode
              state: cool
            - condition: state
              entity_id: select.bedroom_state
              state:
                - wake_up
                - sleeping
                - wind_down
                - occupied
                - empty
          sequence:
            - variables:
                mode: cool

        - conditions:
            - condition: numeric_state
              entity_id: sensor.bedroom_air_quality_score
              below: 50
            - condition: state
              entity_id: binary_sensor.bedroom_window_sensor_door
              state: "off"
            - condition: state
              entity_id: select.bedroom_state
              state:
                - wake_up
                - occupied
                - empty
          sequence:
            - variables:
                mode: filter

    - choose:
        - conditions:
            - condition: template
              value_template: |-
                {{ mode == 'off' }}
          sequence: []

        - conditions:
            - condition: state
              entity_id: select.bedroom_state
              state:
                - wind_down
                - sleeping
                - quiet_time
                - wake_up_soon
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.bedroom_air_purifier_night_mode

      default:
        - action: switch.turn_off
          target:
            entity_id: switch.bedroom_air_purifier_night_mode

    - choose:
        - conditions:
            - condition: template
              value_template: |-
                {{ mode == 'off' }}
            - condition: not
              conditions:
                - condition: state
                  entity_id: climate.bedroom_air_purifier
                  state: "off"
          sequence:
            - action: dyson_local.set_angle
              data:
                entity_id: fan.bedroom_air_purifier_fan
                angle_low: 225
                angle_high: 225

            - action: climate.turn_off
              target:
                entity_id: climate.bedroom_air_purifier

            - action: fan.turn_off
              target:
                entity_id: fan.bedroom_air_purifier_fan

        - conditions:
            - condition: template
              value_template: |-
                {{ mode == 'heat' }}
          sequence:
            - action: climate.turn_on
              target:
                entity_id: climate.bedroom_air_purifier

            - action: climate.set_temperature
              target:
                entity_id: climate.bedroom_air_purifier
              data:
                temperature: "{{ min(states('sensor.bedroom_target_temperature') | float(0.0) + 3, 37) }}"
                hvac_mode: heat

            - action: fan.turn_on
              target:
                entity_id: fan.bedroom_air_purifier_fan

            - action: fan.set_preset_mode
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                preset_mode: Auto

            - action: fan.set_direction
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                direction: forward

            - action: fan.oscillate
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                oscillating: "true"

            - action: dyson_local.set_angle
              data:
                entity_id: fan.bedroom_air_purifier_fan
                angle_low: 155
                angle_high: 225

        - conditions:
            - condition: template
              value_template: |-
                {{ mode == 'cool' }}
          sequence:
            - action: climate.turn_on
              target:
                entity_id: climate.bedroom_air_purifier

            - action: climate.set_temperature
              target:
                entity_id: climate.bedroom_air_purifier
              data:
                temperature: "{{ max(1, states('sensor.bedroom_target_temperature') | float(0.0) - 3) }}"
                hvac_mode: cool

            - action: fan.turn_on
              target:
                entity_id: fan.bedroom_air_purifier_fan

            - action: fan.set_preset_mode
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                preset_mode: Auto

            - action: fan.set_direction
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                direction: forward

            - action: fan.oscillate
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                oscillating: "true"

            - action: dyson_local.set_angle
              data:
                entity_id: fan.bedroom_air_purifier_fan
                angle_low: 155
                angle_high: 225

        - conditions:
            - condition: template
              value_template: |-
                {{ mode == 'fan' }}
          sequence:
            - action: climate.turn_on
              target:
                entity_id: climate.bedroom_air_purifier

            - action: climate.set_temperature
              target:
                entity_id: climate.bedroom_air_purifier
              data:
                temperature: "{{ states('sensor.bedroom_current_temperature') | float(21) }}"
                hvac_mode: cool

            - action: fan.turn_on
              target:
                entity_id: fan.bedroom_air_purifier_fan

            - action: fan.set_percentage
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                percentage: 100

            - action: fan.set_preset_mode
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                preset_mode: Normal

            - action: fan.set_direction
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                direction: forward

            - action: fan.oscillate
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                oscillating: "true"

            - action: dyson_local.set_angle
              data:
                entity_id: fan.bedroom_air_purifier_fan
                angle_low: 155
                angle_high: 225

        - conditions:
            - condition: template
              value_template: |-
                {{ mode == 'filter' }}
          sequence:
            - action: climate.turn_on
              target:
                entity_id: climate.bedroom_air_purifier

            - action: climate.set_hvac_mode
              target:
                entity_id: climate.bedroom_air_purifier
              data:
                hvac_mode: cool

            - action: fan.turn_on
              target:
                entity_id: fan.bedroom_air_purifier_fan

            - action: fan.set_preset_mode
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                preset_mode: Auto

            - action: fan.set_direction
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                direction: reverse

            - action: fan.oscillate
              target:
                entity_id: fan.bedroom_air_purifier_fan
              data:
                oscillating: "true"

            - action: dyson_local.set_angle
              data:
                entity_id: fan.bedroom_air_purifier_fan
                angle_low: 155
                angle_high: 225
