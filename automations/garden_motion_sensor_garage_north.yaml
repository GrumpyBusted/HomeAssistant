- id: garden_motion_sensor_garage_north
  alias: Have bevægelsessensor garage nord
  description: |
    Håndtering af bevægelsessensoren i haven på nord siden af garage
  mode: queued
  max: 10
  trace:
    stored_traces: 5

  triggers:
    - trigger: state
      entity_id: binary_sensor.garden_motion_sensor_garage_north_occupancy
      from: "off"
      to: "on"
      id: detected

    - trigger: state
      entity_id: binary_sensor.garden_motion_sensor_garage_north_occupancy
      from: "on"
      to: "off"
      id: cleared

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: detected
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.garden_motion_sensor_garage_north_timer

        - conditions:
            - condition: trigger
              id: cleared
          sequence:
            - action: timer.start
              data:
                duration: 00:03:00
              target:
                entity_id: timer.garden_motion_sensor_garage_north_timer
