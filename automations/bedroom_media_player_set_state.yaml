- id: "1769856473538"
  alias: Soveværelse medieafstiller sæt status
  description: Automatik til at sætte status helper for medie i soveværelset
  mode: queued
  max: 10
  trace:
    stored_traces: 20

  triggers:
    - trigger: state
      entity_id: sensor.bedroom_apple_tv_media_player_safe
      to: playing
      id: started

    - trigger: state
      entity_id: sensor.bedroom_apple_tv_media_player_safe
      to:
        - buffering
        - idle
        - paused
      id: ended

    - trigger: state
      entity_id: sensor.bedroom_apple_tv_media_player_safe
      to: "off"
      for:
        seconds: 3
      id: "off"

    - trigger: state
      entity_id: timer.bedroom_media_player_timer
      to: idle
      id: timeout

    - trigger: state
      entity_id: binary_sensor.someone_home
      to: "off"
      id: away

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - started
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.bedroom_media_player_timer

            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.bedroom_media_player

        - conditions:
            - condition: trigger
              id:
                - ended
          sequence:
            - action: timer.start
              target:
                entity_id: timer.bedroom_media_player_timer
              data:
                duration: "00:03:00"

            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.bedroom_media_player

        - conditions:
            - condition: trigger
              id:
                - timeout
            - condition: state
              entity_id: sensor.bedroom_apple_tv_media_player_safe
              state:
                - idle
                - paused
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_media_player

        - conditions:
            - condition: trigger
              id:
                - away
                - "off"
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.bedroom_media_player_timer

            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_media_player