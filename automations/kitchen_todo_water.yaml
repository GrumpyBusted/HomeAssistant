- id: "1770996223230"
  alias: Køkken todo vand
  description: Overvåg om der er vand under vasken i køkkenet, send beskeder hvis der opstår lækage
  mode: queued
  max: 10
  trace:
    stored_traces: 30

  triggers:
    - trigger: state
      entity_id: binary_sensor.kitchen_sink_water_leak_sensor
      to: "on"
      for:
        seconds: 30
      id: leak

    - trigger: state
      entity_id: binary_sensor.kitchen_sink_water_leak_sensor
      to: "off"
      for:
        seconds: 30

    - trigger: time_pattern
      hours: /1

  conditions: []

  actions:
    - if:
        - condition: trigger
          id: leak
      then:
        - action: script.push_notification
          data:
            type: warning
            title: Advarsel
            id: kitchen_sink_water_leak
            persistent: false
            recipient: home
            message: Vand lækage sensoren der ligger under opvaskemaskinen ved vasken i køkkenet har registret vand.

    - action: script.create_todo_task
      data:
        subject: Vand på gulvet under køkkenvasken
        entity_id: todo.todo_smart_todo
        description: Vand lækage sensoren der ligger under opvaskemaskinen ved vasken i køkkenet har registret vand.
        related_entity_id: binary_sensor.kitchen_sink_water_leak_sensor
        is_active: "{{ is_state('binary_sensor.kitchen_sink_water_leak_sensor', 'on') }}"
