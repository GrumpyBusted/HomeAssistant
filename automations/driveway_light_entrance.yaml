- id: "1760883022741"
  alias: Indkørsel lys entre
  description: Automatik til at styre lys i indkørslen ved hoveddøren
  mode: queued
  max: 10
  trace:
    stored_traces: 20

  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.driveway_entrance_presence
      from: "off"
      to: "on"
      id: detected_entrance

    - trigger: state
      entity_id:
        - binary_sensor.driveway_entrance_presence
      from: "on"
      to: "off"
      id: cleared_entrance

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - detected_entrance
            - condition: state
              entity_id: binary_sensor.home_outside_light
              state: "off"
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                brightness_pct: 70
                transition: 1
                color_temp_kelvin: 2700
              target:
                entity_id:
                  - light.driveway_light_entrance_spot_1
                  - light.driveway_light_entrance_spot_2
                  - light.driveway_light_entrance_spot_3

        - conditions:
            - condition: trigger
              id:
                - cleared_entrance
          sequence:
            - action: light.turn_off
              metadata: {}
              data:
                transition: 1
              target:
                entity_id:
                  - light.driveway_light_entrance_spot_1
                  - light.driveway_light_entrance_spot_2
                  - light.driveway_light_entrance_spot_3
