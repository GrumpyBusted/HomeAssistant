- id: '1769101770558'
  alias: Soveværelse dør
  description: Automatik til at styre timer til soveværelse dør
  triggers:
  - trigger: state
    entity_id: binary_sensor.bedroom_door
    to: 'off'
    id: closed
  - trigger: state
    entity_id: binary_sensor.bedroom_door
    to: 'on'
    id: opened
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: closed
      sequence:
      - action: timer.cancel
        target:
          entity_id: timer.bedroom_door_timer
    - conditions:
      - condition: trigger
        id: opened
      sequence:
      - action: timer.start
        target:
          entity_id: timer.bedroom_door_timer
        data:
          duration: 00:02:00
  mode: queued
  max: 10
  trace:
    stored_traces: 50
