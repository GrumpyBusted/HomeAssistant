- id: '1760878547397'
  alias: Indkørsel bevægelsessensor vej
  description: Håndtering af bevægelsessensoren i indkørslen ved vejen
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.driveway_motion_sensor_street_occupancy
    from: 'off'
    to: 'on'
    id: detected
  - trigger: state
    entity_id:
    - binary_sensor.driveway_motion_sensor_street_occupancy
    from: 'on'
    to: 'off'
    id: cleared
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - detected
      sequence:
      - action: timer.cancel
        target:
          entity_id: timer.driveway_motion_sensor_street_timer
    - conditions:
      - condition: trigger
        id:
        - cleared
      sequence:
      - action: timer.start
        metadata: {}
        data:
          duration: 00:03:00
        target:
          entity_id: timer.driveway_motion_sensor_street_timer
  mode: queued
  max: 10
  trace:
    stored_traces: 5
