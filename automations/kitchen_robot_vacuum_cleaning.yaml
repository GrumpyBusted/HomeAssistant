- id: "1765134832184"
  alias: Køkken robotstøvsuger rengøring
  description: |
    Styring af robotstøvsuger for at gør rent i køkkenet og bryggers
  mode: queued
  max: 10
  trace:
    stored_traces: 100

  triggers:
    - trigger: state
      entity_id: input_select.living_room_robot_vacuum_current_cleaning
      to: none

    - trigger: numeric_state
      entity_id: sensor.living_room_robot_vacuum_battery
      above: 30

    - trigger: state
      entity_id: binary_sensor.living_room_media_player
      to: "off"

    - trigger: state
      entity_id: select.bedroom_state
      to:
        - away
        - occupied
        - empty
      for: 00:02:00

    - trigger: state
      entity_id: binary_sensor.monique_sleep_window
      to: "off"
      for: 00:02:00

    - trigger: state
      entity_id: binary_sensor.kitchen_presence
      to: "off"

    - trigger: state
      entity_id: binary_sensor.utility_room_presence
      to: "off"

    - trigger: time
      at: "11:30:00"

    - trigger: state
      entity_id: sensor.living_room_robot_vacuum_time_since_empty_dust_bin
      to: "0"
      for: 00:02:00

  conditions:
    - condition: state
      entity_id: input_select.living_room_robot_vacuum_current_cleaning
      state: none

  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: |-
                {{ (states('input_datetime.kitchen_robot_vacuum_last_cleaning_time') | as_datetime).date() != now().date() }}
            - condition: numeric_state
              entity_id: sensor.living_room_robot_vacuum_battery
              above: 40
            - condition: state
              entity_id: binary_sensor.living_room_media_player
              state: "off"
            - condition: state
              entity_id: select.bedroom_state
              state:
                - away
                - occupied
                - empty
            - condition: state
              entity_id: binary_sensor.monique_sleep_window
              state: "off"
            - condition: state
              entity_id: binary_sensor.kitchen_presence
              state: "off"
            - condition: state
              entity_id: binary_sensor.utility_room_presence
              state: "off"
            - condition: template
              value_template: |-
                {{ states('sensor.living_room_robot_vacuum_time_since_empty_dust_bin')|int < 20 }}
          sequence:
            - action: script.living_room_robot_vacuum_set_current
              data:
                option: kitchen_cleaning
                started_by: "{{ this.entity_id }}"

        - conditions:
            - condition: template
              value_template: |-
                {{ (states('input_datetime.kitchen_robot_vacuum_last_cleaning_time') | as_datetime | as_local).date() < (now().date() - timedelta(days=1)) }}
            - condition: time
              after: "11:30:00"
            - condition: numeric_state
              entity_id: sensor.living_room_robot_vacuum_battery
              above: 40
          sequence:
            - action: script.living_room_robot_vacuum_set_current
              data:
                option: kitchen_cleaning
                started_by: "{{ this.entity_id }}"

    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.living_room_robot_vacuum_current_cleaning
              state: kitchen_cleaning
            - condition: time
              weekday:
                - mon
                - wed
                - fri
                - sun
          sequence:
            - action: script.living_room_robot_vacuum_start_cleaning
              data:
                type: vac_mop_low
                timeout: 30
                rooms:
                  - Køkken
                  - Bryggers
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.kitchen_robot_vacuum_last_cleaning_time
              data:
                datetime: "{{ (now() | as_local).strftime('%Y-%m-%d %H:%M:%S') }}"

        - conditions:
            - condition: state
              entity_id: input_select.living_room_robot_vacuum_current_cleaning
              state: kitchen_cleaning
          sequence:
            - action: script.living_room_robot_vacuum_start_cleaning
              data:
                type: vac_mop
                timeout: 30
                rooms:
                  - Køkken
                  - Bryggers
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.kitchen_robot_vacuum_last_cleaning_time
              data:
                datetime: "{{ (now() | as_local).strftime('%Y-%m-%d %H:%M:%S') }}"
