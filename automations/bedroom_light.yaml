- id: "1736083584615"
  alias: Soveværelse lys
  description: |
    Automatik til at styre lys på soveværelset
  mode: queued
  max: 10
  trace:
    stored_traces: 50

  triggers:
    - trigger: state
      entity_id: event.bedroom_switch_button_1
      attribute: event_type
      to: initial_press
      id: button_1

    - trigger: state
      entity_id: event.bedroom_switch_button_2
      attribute: event_type
      to: initial_press
      id: button_2

    - trigger: state
      entity_id: event.bedroom_switch_button_3
      attribute: event_type
      to: initial_press
      id: button_3

    - trigger: state
      entity_id: event.bedroom_switch_button_4
      attribute: event_type
      to: initial_press
      id: button_4

    - trigger: state
      entity_id: binary_sensor.parent_home
      to: "off"
      id: parents_leave

    - trigger: state
      entity_id: input_boolean.house_sitter
      to: "off"
      id: house_sitter_leave

    - trigger: state
      entity_id: binary_sensor.bedroom_presence
      from: "on"
      to: "off"
      id: cleared

    - trigger: state
      entity_id: binary_sensor.bedroom_presence
      from: "off"
      to: "on"
      id: detected

    - trigger: state
      entity_id:
        - sensor.anders_iphone_battery_state
        - sensor.monique_iphone_battery_state
      to: Charging
      id: charging

    - trigger: time
      at: input_datetime.monique_wake_up_alarm
      id: wake_up

    - trigger: state
      entity_id: timer.bedroom_light_sunrise_delay_timer
      from: active
      to: idle
      id: sunrise_script

    - trigger: state
      entity_id: select.bedroom_state

    - trigger: state
      entity_id: binary_sensor.bedroom_light
      from: "off"
      to: "on"
      for: 00:15:00
      id: lights_on

  conditions: []

  actions:
    - if:
        - condition: state
          entity_id: timer.bedroom_light_sunrise_delay_timer
          state: active
      then:
        - action: timer.cancel
          target:
            entity_id: timer.bedroom_light_sunrise_delay_timer

    - choose:
        - conditions:
            - condition: trigger
              id: button_1
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.bedroom_lights
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 80

        - conditions:
            - condition: trigger
              id: button_2
          sequence:
            - action: script.bedroom_light_sunrise

        - conditions:
            - condition: trigger
              id: button_3
          sequence:
            - action: script.bedroom_light_sunset
              data:
                transition: 180
                brightness_from: 200
                brightness_to: 50

        - conditions:
            - condition: trigger
              id: button_4
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.bedroom_lights
              data:
                transition: 1

        - conditions:
            - condition: trigger
              id: detected
            - condition: state
              entity_id: select.bedroom_state
              state: occupied
            - condition: numeric_state
              entity_id: sensor.home_outside_avarage_illuminance_15m
              below: 5000
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.bedroom_lights
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 80

        - conditions:
            - condition: trigger
              id: cleared
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.bedroom_lights
              data:
                transition: 1

        - conditions:
            - condition: trigger
              id: blind_opened
            - condition: state
              entity_id: binary_sensor.bedroom_presence
              state: "on"
            - condition: numeric_state
              entity_id: sensor.home_outside_avarage_illuminance_15m
              below: 5000
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.bedroom_lights
              data:
                transition: 30
                color_temp_kelvin: 2700
                brightness_pct: 80

        - conditions:
            - condition: trigger
              id: blind_closed
            - condition: state
              entity_id: binary_sensor.bedroom_light
              state: "on"
          sequence:
            - action: script.bedroom_light_sunset
              data:
                transition: 180
                brightness_from: 200
                brightness_to: 50

        - conditions:
            - condition: trigger
              id: wake_up
            - condition: state
              entity_id: binary_sensor.bedroom_light
              state: "off"
            - condition: state
              entity_id: binary_sensor.monique_home
              state: "on"
          sequence:
            - action: script.bedroom_light_sunrise

        - conditions:
            - condition: trigger
              id: sunrise_script
          sequence:
            - action: script.bedroom_light_sunrise

        - conditions:
            - condition: trigger
              id:
                - parents_leave
                - house_sitter_leave
            - condition: state
              entity_id: binary_sensor.parent_home
              state: "off"
            - condition: state
              entity_id: input_boolean.house_sitter
              state: "off"
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.bedroom_lights
              data:
                transition: 1

        - conditions:
            - condition: trigger
              id: lights_on
            - condition: state
              entity_id: binary_sensor.parent_home
              state: "off"
            - condition: state
              entity_id: input_boolean.house_sitter
              state: "off"
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.bedroom_lights
              data:
                transition: 1

        - conditions:
            - condition: trigger
              id: charging
            - condition: or
              conditions:
                - condition: state
                  entity_id: binary_sensor.anders_home
                  state: "on"
                - condition: state
                  entity_id: binary_sensor.monique_home
                  state: "on"
            - condition: or
              conditions:
                - condition: state
                  entity_id: binary_sensor.anders_home
                  state: "off"
                - condition: state
                  entity_id: sensor.anders_iphone_battery_state
                  state: Charging
            - condition: or
              conditions:
                - condition: state
                  entity_id: binary_sensor.monique_home
                  state: "off"
                - condition: state
                  entity_id: sensor.monique_iphone_battery_state
                  state: Charging
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.bedroom_lights
              data:
                transition: 10
