- id: "1770505461525"
  alias: Indkørsel billader
  description: |
    Disable entities på billader
  mode: single
  trace:
    stored_traces: 100

  triggers:
    - trigger: state
      entity_id: sensor.driveway_ev_charger_state_description_safe

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.driveway_ev_charger_state_description_safe
              state:
                - Locked
                - Locked, car connected
                - Ready
                - unavailable
          sequence:
            - action: homeassistant.disable_entity
              data:
                entity_id: switch.driveway_ev_charger_pause

      default:
        - action: homeassistant.enable_entity
          data:
            entity_id: switch.driveway_ev_charger_pause
