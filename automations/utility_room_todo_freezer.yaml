- id: "1770535740851"
  alias: Bryggers todo fryser
  description: Overvåg fryser i bryggerset, send beskeder hvis der opstår fejl
  mode: queued
  max: 10
  trace:
    stored_traces: 30

  triggers:
    - trigger: numeric_state
      entity_id: sensor.utility_room_freezer_temperature_sensor_temperature
      above: -17
      id: freezer_to_warm

    - trigger: time_pattern
      hours: "/1"
      id: periodic

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: freezer_to_warm
          sequence:
            - action: script.push_notification
              data:
                type: critical
                title: Advarsel
                id: utility_room_freezer_temperature
                persistent: false
                recipient: home
                message: >
                  Fryseren i bryggerset er for varmt, temperaturen er
                  {{ states('sensor.utility_room_freezer_temperature_sensor_temperature') | round(1) }}
                  °C, skal være under -17 °C

        - conditions:
            - condition: trigger
              id: periodic
          sequence:
            - action: script.create_todo_task
              data:
                subject: Indstil temperatur på fryseren i bryggerset
                entity_id: todo.todo_smart_todo
                description: >
                  Fryseren i bryggersets temperaturen er
                  {{ states('sensor.utility_room_freezer_temperature_sensor_temperature') | round(1) }}
                  °C, bør være -18 °C
                related_entity_id: sensor.utility_room_freezer_temperature_sensor_temperature
                is_active: "{{ not (-22 <= (states('sensor.utility_room_freezer_temperature_sensor_temperature') | float(0)) <= -17) }}"