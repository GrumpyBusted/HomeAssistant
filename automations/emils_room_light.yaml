- id: "1735852365839"
  alias: Emils værelse lys
  description: Automatik til at styre lys på Emils værelse
  mode: queued
  max: 10
  trace:
    stored_traces: 20

  triggers:
    - trigger: state
      entity_id:
        - event.emils_room_switch_button_1
      id: button_1_short
      attribute: event_type
      to: short_release

    - trigger: state
      entity_id:
        - event.emils_room_switch_button_1
      id: button_1_long
      attribute: event_type
      to: long_release

    - trigger: state
      entity_id:
        - event.emils_room_switch_button_2
      id: button_2

    - trigger: state
      entity_id:
        - event.emils_room_switch_button_3
      id: button_3

    - trigger: state
      entity_id:
        - event.emils_room_switch_button_4
      id: button_4
      attribute: event_type
      to: initial_press

    - trigger: state
      entity_id:
        - binary_sensor.emil_home
      from: "on"
      to: "off"
      id: emil_leaving

    - trigger: state
      entity_id:
        - binary_sensor.emil_home
      from: "off"
      to: "on"
      id: emil_home

    - trigger: state
      entity_id:
        - binary_sensor.emils_room_light
      from: "off"
      to: "on"
      for:
        hours: 0
        minutes: 15
        seconds: 0
      id: lights_on

    - trigger: time
      at: input_datetime.emil_bedtime_alarm
      id: bedtime

    - trigger: time
      at: input_datetime.emil_wake_up_alarm
      id: wake_up

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - button_1_short
                - emil_home
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 80
              target:
                entity_id:
                  - light.emils_room_lights

        - conditions:
            - condition: trigger
              id:
                - button_1_long
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                transition: 1
                color_temp_kelvin: 3000
                brightness_pct: 100
              target:
                entity_id:
                  - light.emils_room_lights

        - conditions:
            - condition: state
              entity_id: binary_sensor.emils_room_light
              state: "off"
            - condition: trigger
              id:
                - button_2
                - button_3
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                transition: 60
                color_temp_kelvin: 2300
                brightness: 10
              target:
                entity_id:
                  - light.emils_room_lights

        - conditions:
            - condition: trigger
              id:
                - button_2
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                transition: 0.5
                brightness_step_pct: 10
              target:
                entity_id:
                  - light.emils_room_lights

        - conditions:
            - condition: trigger
              id:
                - button_3
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                transition: 0.5
                brightness_step_pct: -10
              target:
                entity_id:
                  - light.emils_room_lights

        - conditions:
            - condition: trigger
              id:
                - button_4
          sequence:
            - action: light.turn_off
              metadata: {}
              data:
                transition: 1
              target:
                entity_id:
                  - light.emils_room_lights

        - conditions:
            - condition: trigger
              id:
                - emil_leaving
                - lights_on
            - condition: state
              entity_id: binary_sensor.emil_home
              state: "off"
            - condition: state
              entity_id: input_boolean.house_sitter
              state: "off"
          sequence:
            - action: light.turn_off
              metadata: {}
              data:
                transition: 1
              target:
                entity_id:
                  - light.emils_room_lights

        - conditions:
            - condition: trigger
              id:
                - wake_up
            - condition: state
              entity_id: binary_sensor.emil_home
              state: "on"
            - condition: state
              entity_id: binary_sensor.emils_room_light
              state: "off"
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                transition: 60
                color_temp_kelvin: 2700
                brightness_pct: 80
              target:
                entity_id:
                  - light.emils_room_lights

        - conditions:
            - condition: trigger
              id:
                - bedtime
            - condition: state
              entity_id: binary_sensor.emil_home
              state: "on"
            - condition: numeric_state
              entity_id: light.emils_room_lights
              attribute: brightness
              above: 30
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                transition: 10
                brightness: 30
              target:
                entity_id:
                  - light.emils_room_lights
