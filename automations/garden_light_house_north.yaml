- id: "1760825733513"
  alias: Have lys hus nord
  description: |
    Automatik til at styre lys i haven på nord siden af huset
  mode: queued
  max: 10
  trace:
    stored_traces: 20

  triggers:
    - trigger: state
      entity_id: binary_sensor.garden_house_north_presence
      from: "off"
      to: "on"
      id: detected_north

    - trigger: state
      entity_id: binary_sensor.garden_house_north_presence
      from: "on"
      to: "off"
      id: cleared_north

    - trigger: state
      entity_id: binary_sensor.garden_house_east_presence
      from: "off"
      to: "on"
      id: detected_east

    - trigger: state
      entity_id: binary_sensor.garden_house_east_presence
      from: "on"
      to: "off"
      id: cleared_east

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - detected_north
                - detected_east
            - condition: state
              entity_id: binary_sensor.home_outside_light
              state: "off"
          sequence:
            - action: light.turn_on
              data:
                brightness_pct: 100
                color_temp_kelvin: 2700
                transition: 1
              target:
                entity_id: light.garden_light_house_north

        - conditions:
            - condition: and
              conditions:
                - condition: trigger
                  id:
                    - cleared_north
                    - cleared_east
                - condition: state
                  entity_id: binary_sensor.garden_house_north_presence
                  state: "off"
                - condition: state
                  entity_id: binary_sensor.garden_house_east_presence
                  state: "off"
          sequence:
            - action: light.turn_off
              data:
                transition: 1
              target:
                entity_id: light.garden_light_house_north
