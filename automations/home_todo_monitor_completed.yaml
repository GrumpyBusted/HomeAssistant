- id: "1770324301195"
  alias: Hjem todo overvåg afsluttede
  description: |
    Send event når et item bliver afsluttet
  mode: queued
  max: 10
  trace:
    stored_traces: 50

  triggers:
    - trigger: state
      entity_id: todo.todo_smart_todo

  conditions: []

  actions:
    - variables:
        completed: >
          {% set new = trigger.to_state.attributes.all_todos
            | default([])
            | selectattr('status', 'eq', 'completed')
            | list %}
          
          {% set old = trigger.from_state.attributes.all_todos
            | default([])
            | selectattr('status', 'eq', 'completed')
            | map(attribute='todo_id')
            | list %}
          
          {% set completed = new | rejectattr('todo_id', 'in', old) | list %} {% set ns = namespace(result=[]) %}
          
          {% for item in completed %}
            {% set related = none %}
          
            {% if 'Relateret:' in item.description %}
              {% set related = item.description.split('Relateret:')[1].strip() %}
            {% endif %}
          
            {% set ns.result = ns.result + [{
              "subject": item.subject,
              "todo_id": item.todo_id,
              "related": related
            }] %}
          {% endfor %}
          
          {{ ns.result | to_json }}

    - repeat:
        count: "{{ completed | trim | from_json | length }}"
        sequence:
          - variables:
              item: "{{ (completed | trim | from_json)[repeat.index - 1] }}"
          - event: todo_item_completed
            event_data:
              subject: "{{ item.subject }}"
              todo_id: "{{ item.todo_id }}"
              related: "{{ item.related }}"
