- id: "1763847410643"
  alias: Garage lås
  description: |
    Automatik til at låse garage døren op og i baseret på hvem der er hjemme
  mode: queued
  max: 10
  trace:
    stored_traces: 100

  triggers:
    - trigger: state
      entity_id: binary_sensor.someone_home
      from: "on"
      to: "off"
      id: no_one_home

    - trigger: state
      entity_id: binary_sensor.everyone_sleeping
      from: "off"
      to: "on"
      id: sleeping

    - trigger: state
      entity_id: select.bedroom_state
      to: wind_down
      id: bedroom_going_to_sleep

    - trigger: state
      entity_id: timer.garage_lock_timer
      to: idle
      id: auto_locking_expired

  conditions: []

  actions:
    - action: homeassistant.update_entity
      data:
        entity_id: lock.garage_lock
    - delay:
        seconds: 3

    - choose:
        - conditions:
            - condition: or
              conditions:
                - condition: trigger
                  id:
                    - no_one_home
                    - sleeping
                    - bedroom_going_to_sleep
            - condition: state
              entity_id: lock.garage_lock
              state: unlocked
          sequence:
            - action: lock.lock
              target:
                entity_id: lock.garage_lock
            - action: timer.start
              data:
                duration: 00:00:10
              target:
                entity_id: timer.garage_lock_timer

        - conditions:
            - condition: trigger
              id: auto_locking_expired
            - condition: state
              entity_id: lock.garage_lock
              state: unlocked
            - condition: state
              entity_id: binary_sensor.house_sitter_home
              state: "off"
          sequence:
            - action: script.push_notification
              data:
                type: warning
                title: Advarsel
                message: Garage døren kunne ikke låses automatisk!
                id: garage_lock_auto_warning
                recipient: home
                persistent: false
