- id: "1737201831964"
  alias: Indkørsel billader sæt pris
  description: Sæt elektricitets prisen på billader
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: sensor.energy_price

    - trigger: template
      value_template: |
        {% set last = state_attr('automation.driveway_ev_charger_set_price', 'last_triggered') %} 
        {{ last is none or ( now() - last ).total_seconds() > 3600 }}

  conditions: []

  actions:
    - action: number.set_value
      data:
        value: "{{ states('sensor.energy_price') }}"
      target:
        entity_id: number.driveway_ev_charger_energy_price
