- id: "1760878828758"
  alias: Indkørsel bevægelsessensor entre
  description: |
    Håndtering af bevægelsessensoren i indkørslen ved hoveddøren
  mode: queued
  max: 10
  trace:
    stored_traces: 5

  triggers:
    - trigger: state
      entity_id: binary_sensor.driveway_motion_sensor_entrance_occupancy
      from: "off"
      to: "on"
      id: detected

    - trigger: state
      entity_id: binary_sensor.driveway_motion_sensor_entrance_occupancy
      from: "on"
      to: "off"
      id: cleared

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: detected
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.driveway_motion_sensor_entrance_timer

        - conditions:
            - condition: trigger
              id: cleared
          sequence:
            - action: timer.start
              data:
                duration: 00:03:00
              target:
                entity_id: timer.driveway_motion_sensor_entrance_timer
