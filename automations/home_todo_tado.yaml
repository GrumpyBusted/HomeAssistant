- id: "1770581923900"
  alias: Hjem todo Tado
  description: Kontroller batteri status på Tado enheder
  mode: restart
  trace:
    stored_traces: 10

  triggers:
    - trigger: time
      at: 03:15:00

  conditions: []

  actions:
    - action: rest_command.tado_get_access_token
      data:
        refresh_token: "{{ states('input_text.tado_refresh_token') }}"
      response_variable: response
    - if:
        - condition: template
          value_template: "{{ response.status != 200 }}"
      then:
        - action: script.push_notification
          data:
            type: warning
            recipient: anders
            persistent: true
            id: rest_command.tado_get_access_token
            title: "Fejl ved get access token fra Tado - Status: {{ response.status }}"
            message: "{{ response }}"
        - stop: Fejl fra get_access_token fra tado
    - variables:
        access_token: "{{ response.content.access_token }}"
        refresh_token: "{{ response.content.refresh_token }}"
    - if:
        - condition: template
          value_template: "{{ refresh_token == '' or access_token == '' }}"
      then:
        - action: system_log.write
          data:
            level: debug
            message: "Response: {{ response }}

              "
        - stop: Ingen token fra get_access_token fra Tado
    - action: input_text.set_value
      target:
        entity_id: input_text.tado_refresh_token
      data:
        value: "{{ refresh_token }}"
    - action: rest_command.tado_get_profile
      data:
        bearer_token: "{{ access_token }}"
      response_variable: response
    - action: system_log.write
      data:
        level: debug
        message: "Response: {{ response }}

          "
    - variables:
        home_id: "{{ response.content.homes[0].id }}"
    - action: rest_command.tado_get_rooms_and_devices
      data:
        home_id: "{{ home_id }}"
        bearer_token: "{{ access_token }}"
      response_variable: response
    - action: system_log.write
      data:
        level: debug
        message: "Response: {{ response }}

          "
    - variables:
        devices:
          "[\n  {% for room in response.content.rooms %}\n    {% for device in room.devices %}\n      {\n        \"roomName\": \"{{ room.roomName }}\",\n \       \"deviceSerialNo\": \"{{ device.serialNumber }}\",\n        \"batteryState\": \"{{ device.batteryState }}\",\n        \"mountingState\": \"{{ device.mountingState | default('') }}\",\n        \"type\": \"{{ state_attr('sensor.tado_device_types', 'types').get(device.type, device.type) }}\",\n        \"location\": \"{{ state_attr('sensor.tado_device_locations', 'locations').get(device.serialNumber, device.serialNumber) }}\",\n        \"entity_id\": \"{{ state_attr('sensor.tado_device_ids', 'ids').get(device.serialNumber, device.serialNumber) }}\",\n        \"battery\": \"{{ state_attr('sensor.tado_device_batterys', 'batterys').get(device.type, device.type) }}\",\n      }{% if not loop.last %}, {% endif %}\n    {% endfor %}\n  {% if not loop.last %}, {% endif %}\n \ {% endfor %}\n]"
    - repeat:
        count: "{{ devices | length }}"
        sequence:
          - action: system_log.write
            metadata: {}
            data:
              level: debug
              message: "{{ devices[repeat.index - 1] }}"
          - action: script.create_todo_task
            data:
              subject: Skift batteri på {{ devices[repeat.index - 1].type }} i {{ devices[repeat.index - 1].roomName }}{{ '' if not devices[repeat.index - 1].location else ' (' ~ devices[repeat.index - 1].location ~ ')'}}
              description: "Skift batteri på Tado {{ devices[repeat.index - 1].type }} med serie no {{ devices[repeat.index - 1].deviceSerialNo }}, der er pladseret {{ devices[repeat.index - 1].roomName }}{{ '' if not devices[repeat.index - 1].location else ' (' ~ devices[repeat.index - 1].location ~ ')'}}, batteri status er {{ devices[repeat.index - 1].batteryState }}. Batteri: {{ devices[repeat.index - 1].battery }}"
              related_entity_id: "{{ devices[repeat.index - 1].entity_id }}"
              entity_id: todo.todo_smart_todo
              is_active: "{{ devices[repeat.index - 1].batteryState != 'NORMAL' }}"
          - action: script.create_todo_task
            data:
              subject: Monter {{ devices[repeat.index - 1].type }} korrekt i {{ devices[repeat.index - 1].roomName }}{{ '' if not devices[repeat.index - 1].location else ' (' ~ devices[repeat.index - 1].location ~ ')'}}
              description: Monter og kalibrer Tado {{ devices[repeat.index - 1].type }} med serie no {{ devices[repeat.index - 1].deviceSerialNo }}, der er pladseret {{ devices[repeat.index - 1].roomName }}{{ '' if not devices[repeat.index - 1].location else ' (' ~ devices[repeat.index - 1].location ~ ')'}}, monteringsstatus er {{ devices[repeat.index - 1].mountingState }}.
              related_entity_id: "{{ devices[repeat.index - 1].entity_id }}_mount"
              entity_id: todo.todo_smart_todo
              is_active: "{{ (devices[repeat.index - 1].mountingState | default('')) not in ['', 'CALIBRATED'] }}"
