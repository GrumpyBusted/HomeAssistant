- id: "1740337167224"
  alias: Hjem todo Aqara vibrationsensor
  description: |
    Kontroller batteri status på Aqara vibrationsensorer
  mode: restart
  trace:
    stored_traces: 30

  triggers:
    - trigger: numeric_state
      entity_id: sensor.driveway_mailbox_vibration_sensor_battery
      below: 20
      for: 00:03:00

    - trigger: numeric_state
      entity_id: sensor.driveway_mailbox_vibration_sensor_battery
      above: 70
      for: 00:03:00

    - trigger: time
      at: 03:06:00

  conditions: []

  actions:
    - variables:
        sensors:
          - entity_id: sensor.driveway_mailbox_vibration_sensor_battery
            temperature: "{{ states('sensor.driveway_mailbox_vibration_sensor_device_temperature') }}"
    - repeat:
        for_each: "{{ sensors }}"
        sequence:
          - action: script.create_todo_battery_task
            data:
              entity_id: "{{ repeat.item.entity_id }}"
              temperature:
              threshold: 20
