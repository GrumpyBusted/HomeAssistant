- id: "1761840992462"
  alias: Terrasse lås
  description: Automatik til at styre terrasse dør låsen
  mode: queued
  max: 10
  trace:
    stored_traces: 50

  triggers:
    - trigger: state
      entity_id: binary_sensor.someone_home
      from: "on"
      to: "off"
      id: no_one_home

    - trigger: state
      entity_id: binary_sensor.everyone_sleeping
      from: "off"
      to: "on"
      id: sleeping

    - trigger: state
      entity_id: select.bedroom_state
      to: wind_down
      id: bedroom_going_to_sleep

    - trigger: state
      entity_id: timer.patio_lock_timer
      to: idle
      id: auto_locking_expired

  conditions: []

  actions:
    - action: homeassistant.update_entity
      data:
        entity_id: lock.patio_lock

    - delay:
        seconds: 3

    - choose:
        - conditions:
            - condition: or
              conditions:
                - condition: trigger
                  id:
                    - no_one_home
                    - sleeping
                    - bedroom_going_to_sleep
            - condition: state
              entity_id: lock.patio_lock
              state: unlocked
          sequence:
            - action: lock.lock
              target:
                entity_id: lock.patio_lock

            - action: timer.start
              target:
                entity_id: timer.patio_lock_timer
              data:
                duration: "00:01:00"

        - conditions:
            - condition: trigger
              id:
                - auto_locking_expired
            - condition: state
              entity_id: lock.patio_lock
              state: unlocked
          sequence:
            - action: lock.lock
              target:
                entity_id: lock.patio_lock

            - delay: "00:00:01"

            - if:
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: lock.patio_lock
                      state: locked
                - condition: state
                  entity_id: binary_sensor.house_sitter_home
                  state: "off"
              then:
                - action: script.push_notification
                  data:
                    type: critical
                    title: Advarsel
                    message: Terrassedøren kunne ikke låses automatisk!
                    id: patio_lock_auto_warning
                    recipient: home
                    persistent: false