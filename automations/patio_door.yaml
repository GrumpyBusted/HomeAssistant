- id: "1770410173949"
  alias: Terrasse dør
  description: |
    Automatik til at styre timer til terrasse dør
  mode: queued
  max: 10
  trace:
    stored_traces: 50

  triggers:
    - trigger: state
      entity_id: binary_sensor.patio_door
      to: "off"
      id: closed

    - trigger: state
      entity_id: binary_sensor.patio_door
      to: "on"
      id: opened

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: closed
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.patio_door_timer

        - conditions:
            - condition: trigger
              id: opened
          sequence:
            - action: timer.start
              target:
                entity_id: timer.patio_door_timer
              data:
                duration: "00:00:15"
