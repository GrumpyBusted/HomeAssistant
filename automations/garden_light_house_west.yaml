- id: "1760825948230"
  alias: Have lys hus vest
  description: Automatik til at styre lys i haven på vest siden af huset
  mode: queued
  max: 10
  trace:
    stored_traces: 20

  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.garden_house_west_presence
      from: "off"
      to: "on"
      id: detected_west

    - trigger: state
      entity_id:
        - binary_sensor.garden_house_west_presence
      from: "on"
      to: "off"
      id: cleared_west

    - trigger: state
      entity_id:
        - binary_sensor.driveway_house_south_presence
      from: "off"
      to: "on"
      id: detected_south

    - trigger: state
      entity_id:
        - binary_sensor.driveway_house_south_presence
      from: "on"
      to: "off"
      id: cleared_south

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - detected_west
                - detected_south
            - condition: state
              entity_id: binary_sensor.home_outside_light
              state: "off"
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                brightness_pct: 100
                color_temp_kelvin: 2700
                transition: 1
              target:
                entity_id:
                  - light.garden_light_house_west

        - conditions:
            - condition: and
              conditions:
                - condition: trigger
                  id:
                    - cleared_west
                    - cleared_south
                - condition: state
                  entity_id: binary_sensor.garden_house_west_presence
                  state: "off"
                - condition: state
                  entity_id: binary_sensor.driveway_house_south_presence
                  state: "off"
          sequence:
            - action: light.turn_off
              metadata: {}
              data:
                transition: 1
              target:
                entity_id:
                  - light.garden_light_house_west
