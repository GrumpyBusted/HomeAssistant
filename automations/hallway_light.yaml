- id: "1735851968042"
  alias: Gang lys
  description: Automatik til at styre lys i gangen
  mode: queued
  max: 10
  trace:
    stored_traces: 100

  triggers:
    - trigger: state
      entity_id:
        - event.hallway_switch_button_1
      id: button_1_short
      attribute: event_type
      to: short_release

    - trigger: state
      entity_id:
        - event.hallway_switch_button_1
      id: button_1_long
      attribute: event_type
      to: long_release

    - trigger: state
      entity_id:
        - event.hallway_switch_button_2
      id: button_2

    - trigger: state
      entity_id:
        - event.hallway_switch_button_3
      id: button_3

    - trigger: state
      entity_id:
        - binary_sensor.someone_home
      from: "on"
      to: "off"
      id: no_one_home

    - trigger: state
      entity_id:
        - event.hallway_switch_button_4
      id: button_4
      attribute: event_type
      to: initial_press

    - trigger: state
      entity_id:
        - binary_sensor.anders_home
        - binary_sensor.monique_home
        - binary_sensor.emil_home
        - binary_sensor.charlie_home
        - input_boolean.house_sitter
      from: "off"
      to: "on"
      id: someone_home

    - trigger: state
      entity_id: binary_sensor.hallway_presence
      to: "off"
      id: person_cleared

    - trigger: state
      entity_id: binary_sensor.hallway_presence_sensor_occupancy
      to: "on"
      id: person_detected

    - trigger: state
      entity_id: select.bedroom_state
      to: sleeping
      id: sleeping

    - trigger: state
      entity_id: binary_sensor.bedroom_door
      to: "on"
      id: bedroom_door_opened

    - trigger: state
      entity_id: binary_sensor.bedroom_door
      to: "off"
      id: bedroom_door_closed

    - trigger: state
      entity_id: binary_sensor.hallway_light
      from: "off"
      to: "on"
      for:
        hours: 0
        minutes: 15
        seconds: 0
      id: lights_on

  conditions: []

  actions:
    - variables:
        transition: 1
        brightness: "{{ (state_attr('light.hallway_lights', 'brightness') | int(0) / 255 * 100) | int(0) }}"
        kelvin: "{{ state_attr('light.hallway_lights', 'color_temp_kelvin') | int(0) }}"
        lights:
          - light.hallway_lights

    - choose:
        - conditions:
            - condition: trigger
              id:
                - button_1_short
                - button_1_long
                - button_2
                - button_3
                - button_4
          sequence: []

        - conditions:
            - condition: trigger
              id:
                - no_one_home
          sequence:
            - variables:
                brightness: 0

        - conditions:
            - condition: trigger
              id:
                - lights_on
            - condition: state
              entity_id: binary_sensor.someone_home
              state: "off"
          sequence:
            - variables:
                brightness: 0

        - conditions:
            - condition: trigger
              id:
                - someone_home
            - condition: state
              entity_id: binary_sensor.bedroom_door
              state: "on"
            - condition: state
              entity_id: select.bedroom_state
              state:
                - wind_down
                - sleeping
                - quiet_time
                - wake_up_soon
                - wake_up
            - condition: state
              entity_id: binary_sensor.hallway_light
              state: "off"
          sequence:
            - variables:
                transition: 10
                brightness: 25
                kelvin: 2500
                lights:
                  - light.hallway_light_bathroom
                  - light.hallway_light_toilet

        - conditions:
            - condition: trigger
              id:
                - someone_home
            - condition: state
              entity_id: binary_sensor.hallway_light
              state: "off"
          sequence:
            - variables:
                brightness: 75
                kelvin: 2700

        - conditions:
            - condition: trigger
              id:
                - bedroom_door_opened
            - condition: state
              entity_id: select.bedroom_state
              state:
                - sleeping
                - quiet_time
                - wake_up_soon
            - condition: state
              entity_id: binary_sensor.hallway_light
              state: "on"
          sequence:
            - variables:
                brightness: 0
                transition: 0

        - conditions:
            - condition: trigger
              id:
                - bedroom_door_opened
            - condition: state
              entity_id: binary_sensor.hallway_presence
              state: "on"
          sequence:
            - variables:
                brightness: 75
                kelvin: 2700

        - conditions:
            - condition: trigger
              id:
                - bedroom_door_closed
            - condition: state
              entity_id: binary_sensor.hallway_presence
              state: "on"
            - condition: state
              entity_id: select.bedroom_state
              state:
                - sleeping
                - quiet_time
                - wake_up_soon
            - condition: state
              entity_id: binary_sensor.hallway_light
              state: "off"
          sequence:
            - variables:
                transition: 10
                brightness: 25
                kelvin: 2700

        - conditions:
            - condition: trigger
              id:
                - bedroom_door_closed
            - condition: state
              entity_id: binary_sensor.hallway_presence
              state: "on"
          sequence:
            - variables:
                brightness: 75
                kelvin: 2700

        - conditions:
            - condition: trigger
              id:
                - sleeping
            - condition: state
              entity_id: binary_sensor.bedroom_door
              state: "on"
            - condition: state
              entity_id: binary_sensor.hallway_light
              state: "on"
          sequence:
            - variables:
                brightness: 0
                transition: 10

        - conditions:
            - condition: trigger
              id:
                - bedroom_waking
            - condition: state
              entity_id: binary_sensor.hallway_presence
              state: "on"
            - condition: state
              entity_id: binary_sensor.bedroom_door
              state: "on"
            - condition: state
              entity_id: binary_sensor.hallway_light
              state: "off"
          sequence:
            - variables:
                transition: 60
                brightness: 75
                kelvin: 2700

        - conditions:
            - condition: trigger
              id:
                - person_detected
            - condition: state
              entity_id: binary_sensor.bedroom_door
              state: "on"
            - condition: state
              entity_id: select.bedroom_state
              state:
                - sleeping
                - quiet_time
                - wake_up_soon
          sequence:
            - variables:
                brightness: 0

        - conditions:
            - condition: trigger
              id:
                - person_detected
            - condition: state
              entity_id: binary_sensor.bedroom_door
              state: "off"
            - condition: state
              entity_id: binary_sensor.hallway_light
              state: "off"
            - condition: state
              entity_id: select.bedroom_state
              state:
                - sleeping
                - quiet_time
                - wake_up_soon
            - condition: state
              entity_id: binary_sensor.monique_sleep_window
              state: "on"
            - condition: state
              entity_id: binary_sensor.monique_home
              state: "on"
          sequence:
            - variables:
                transition: 10
                brightness: 25
                kelvin: 2700

        - conditions:
            - condition: trigger
              id:
                - person_detected
            - condition: state
              entity_id: binary_sensor.hallway_light
              state: "off"
            - condition: state
              entity_id: binary_sensor.someone_home
              state: "on"
          sequence:
            - variables:
                brightness: 75
                kelvin: 2700

        - conditions:
            - condition: trigger
              id:
                - person_cleared
            - condition: state
              entity_id: binary_sensor.hallway_light
              state: "on"
          sequence:
            - variables:
                brightness: 0

    - choose:
        - conditions:
            - condition: trigger
              id:
                - button_1_short
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 75
              target:
                entity_id:
                  - light.hallway_lights

        - conditions:
            - condition: trigger
              id:
                - button_1_long
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 3000
                brightness_pct: 100
              target:
                entity_id:
                  - light.hallway_lights

        - conditions:
            - condition: trigger
              id:
                - button_2
          sequence:
            - action: light.turn_on
              data:
                transition: 0.5
                brightness_step_pct: 10
              target:
                entity_id:
                  - light.hallway_lights

        - conditions:
            - condition: trigger
              id:
                - button_3
          sequence:
            - action: light.turn_on
              data:
                transition: 0.5
                brightness_step_pct: -10
              target:
                entity_id:
                  - light.hallway_lights

        - conditions:
            - condition: trigger
              id:
                - button_4
          sequence:
            - action: light.turn_off
              metadata: {}
              data:
                transition: 1
              target:
                entity_id:
                  - light.hallway_lights

        - conditions:
            - condition: template
              value_template: "{{ brightness == 0 }}"
          sequence:
            - action: light.turn_off
              data:
                transition: "{{ transition }}"
              target:
                entity_id: "{{ lights }}"

        - conditions:
            - condition: state
              entity_id: binary_sensor.bedroom_door
              state: "off"
          sequence:
            - action: light.turn_on
              target:
                entity_id: "{{ lights }}"
              data:
                transition: "{{ transition }}"
                color_temp_kelvin: "{{ kelvin }}"
                brightness_pct: "{{ brightness }}"

      default:
        - action: light.turn_on
          target:
            entity_id: "{{ lights }}"
          data:
            transition: "{{ transition }}"
            color_temp_kelvin: "{{ kelvin }}"
            brightness_pct:
              "{% set bedroom = (state_attr('light.bedroom_lights', 'brightness') | int(0) / 255 * 100) | int %} {{ min(bedroom, brightness) if 0 < bedroom < 75 else brightness }}

              "
