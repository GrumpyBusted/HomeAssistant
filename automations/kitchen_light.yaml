- id: "1760275142990"
  alias: Køkken lys
  description: |
    Automatik til at styre lys i køkkenet
  mode: queued
  max: 10
  trace:
    stored_traces: 50

  triggers:
    - trigger: state
      entity_id: event.kitchen_switch_button_1
      attribute: event_type
      to: short_release
      id: button_1_short

    - trigger: state
      entity_id: event.kitchen_switch_button_1
      attribute: event_type
      to: long_release
      id: button_1_long

    - trigger: state
      entity_id: event.kitchen_switch_button_2
      attribute: event_type
      to: short_release
      id: button_2_short

    - trigger: state
      entity_id: event.kitchen_switch_button_2
      attribute: event_type
      to: long_release
      id: button_2_long

    - trigger: state
      entity_id: event.kitchen_switch_button_3
      attribute: event_type
      to: short_release
      id: button_3_short

    - trigger: state
      entity_id: event.kitchen_switch_button_3
      attribute: event_type
      to: long_release
      id: button_3_long

    - trigger: state
      entity_id: event.kitchen_switch_button_4
      attribute: event_type
      to: short_release
      id: button_4_short

    - trigger: state
      entity_id: event.kitchen_switch_button_4
      attribute: event_type
      to: long_release
      id: button_4_long

    - trigger: state
      entity_id: event.kitchen_switch_rotary
      id: rotary

    - trigger: state
      entity_id: binary_sensor.someone_home
      from: "on"
      to: "off"
      id: no_one_home

    - trigger: state
      entity_id: binary_sensor.kitchen_light
      from: "off"
      to: "on"
      for: 00:15:00
      id: lights_on

    - trigger: state
      entity_id: binary_sensor.kitchen_presence
      to: "off"
      id: person_cleared

    - trigger: state
      entity_id: binary_sensor.kitchen_presence
      to: "on"
      id: person_detected

    - trigger: state
      entity_id: binary_sensor.living_room_light
      to: "off"
      id: living_room_light_off

    - trigger: state
      entity_id: binary_sensor.living_room_light
      to: "on"
      id: living_room_light_on

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: button_1_short
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 80
              target:
                entity_id:
                  - light.kitchen_light_strip_countertop
                  - light.kitchen_light_pendant_island_left
                  - light.kitchen_light_pendant_island_right
                  - light.kitchen_light_pendant_sink_left
                  - light.kitchen_light_pendant_sink_right
            - action: light.turn_off
              data:
                transition: 1
              target:
                entity_id:
                  - light.kitchen_light_spot_island
                  - light.kicthen_light_spot_cooktop
                  - light.kitchen_light_spot_oven
                  - light.kitchen_light_spot_sink
                  - light.kitchen_light_spot_fridge
                  - light.kitchen_light_spot_hallway

        - conditions:
            - condition: trigger
              id: button_2_short
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2300
                brightness_pct: 50
              target:
                entity_id: light.kitchen_light_strip_countertop
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2300
                brightness_pct: 15
              target:
                entity_id:
                  - light.kitchen_light_pendant_island_left
                  - light.kitchen_light_pendant_island_right
                  - light.kitchen_light_pendant_sink_left
                  - light.kitchen_light_pendant_sink_right
            - action: light.turn_off
              data:
                transition: 1
              target:
                entity_id:
                  - light.kitchen_light_spot_island
                  - light.kicthen_light_spot_cooktop
                  - light.kitchen_light_spot_oven
                  - light.kitchen_light_spot_sink
                  - light.kitchen_light_spot_fridge
                  - light.kitchen_light_spot_hallway

        - conditions:
            - condition: trigger
              id: button_3_short
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 80
              target:
                entity_id:
                  - light.kitchen_light_pendant_island_left
                  - light.kitchen_light_pendant_island_right
                  - light.kitchen_light_pendant_sink_left
                  - light.kitchen_light_pendant_sink_right
                  - light.kitchen_light_strip_countertop
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 50
              target:
                entity_id:
                  - light.kitchen_light_spot_island
                  - light.kicthen_light_spot_cooktop
                  - light.kitchen_light_spot_oven
                  - light.kitchen_light_spot_sink
                  - light.kitchen_light_spot_fridge
                  - light.kitchen_light_spot_hallway

        - conditions:
            - condition: trigger
              id: button_4_short
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 3000
                brightness_pct: 100
              target:
                entity_id: light.kitchen_lights

        - conditions:
            - condition: trigger
              id:
                - button_1_long
                - button_2_long
                - button_3_long
                - button_4_long
                - no_one_home
                - living_room_light_off
          sequence:
            - action: light.turn_off
              data:
                transition: 1
              target:
                entity_id: light.kitchen_lights

        - conditions:
            - condition: trigger
              id: person_detected
            - condition: state
              entity_id: select.bedroom_state
              state:
                - sleeping
                - quiet_time
                - wake_up_soon
            - condition: state
              entity_id: binary_sensor.kitchen_light
              state: "off"
            - condition: state
              entity_id: binary_sensor.living_room_light
              state: "off"
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2300
                brightness_pct: 10
              target:
                entity_id: light.kitchen_light_strip_countertop

        - conditions:
            - condition: trigger
              id: person_cleared
            - condition: state
              entity_id: select.bedroom_state
              state:
                - sleeping
                - quiet_time
                - wake_up_soon
            - condition: state
              entity_id: binary_sensor.living_room_light
              state: "off"
          sequence:
            - action: light.turn_off
              data:
                transition: 1
              target:
                entity_id: light.kitchen_lights

        - conditions:
            - condition: trigger
              id: person_detected
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 80
              target:
                entity_id:
                  - light.kitchen_light_strip_countertop
                  - light.kitchen_light_pendant_island_left
                  - light.kitchen_light_pendant_island_right
                  - light.kitchen_light_pendant_sink_left
                  - light.kitchen_light_pendant_sink_right
            - action: light.turn_off
              data:
                transition: 1
              target:
                entity_id:
                  - light.kitchen_light_spot_island
                  - light.kicthen_light_spot_cooktop
                  - light.kitchen_light_spot_oven
                  - light.kitchen_light_spot_sink
                  - light.kitchen_light_spot_fridge
                  - light.kitchen_light_spot_hallway

        - conditions:
            - condition: trigger
              id: person_cleared
            - condition: state
              entity_id: binary_sensor.kitchen_light
              state: "on"
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2300
                brightness_pct: 50
              target:
                entity_id: light.kitchen_light_strip_countertop
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2300
                brightness_pct: 15
              target:
                entity_id:
                  - light.kitchen_light_pendant_island_left
                  - light.kitchen_light_pendant_island_right
                  - light.kitchen_light_pendant_sink_left
                  - light.kitchen_light_pendant_sink_right
            - action: light.turn_off
              data:
                transition: 1
              target:
                entity_id:
                  - light.kitchen_light_spot_island
                  - light.kicthen_light_spot_cooktop
                  - light.kitchen_light_spot_oven
                  - light.kitchen_light_spot_sink
                  - light.kitchen_light_spot_fridge
                  - light.kitchen_light_spot_hallway

        - conditions:
            - condition: trigger
              id: living_room_light_on
            - condition: state
              entity_id: binary_sensor.kitchen_presence
              state: "on"
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 80
              target:
                entity_id:
                  - light.kitchen_light_strip_countertop
                  - light.kitchen_light_pendant_island_left
                  - light.kitchen_light_pendant_island_right
                  - light.kitchen_light_pendant_sink_left
                  - light.kitchen_light_pendant_sink_right
            - action: light.turn_off
              data:
                transition: 1
              target:
                entity_id:
                  - light.kitchen_light_spot_island
                  - light.kicthen_light_spot_cooktop
                  - light.kitchen_light_spot_oven
                  - light.kitchen_light_spot_sink
                  - light.kitchen_light_spot_fridge
                  - light.kitchen_light_spot_hallway

        - conditions:
            - condition: trigger
              id: living_room_light_on
          sequence:
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2300
                brightness_pct: 50
              target:
                entity_id: light.kitchen_light_strip_countertop
            - action: light.turn_on
              data:
                transition: 1
                color_temp_kelvin: 2300
                brightness_pct: 15
              target:
                entity_id:
                  - light.kitchen_light_pendant_island_left
                  - light.kitchen_light_pendant_island_right
                  - light.kitchen_light_pendant_sink_left
                  - light.kitchen_light_pendant_sink_right
            - action: light.turn_off
              data:
                transition: 1
              target:
                entity_id:
                  - light.kitchen_light_spot_island
                  - light.kicthen_light_spot_cooktop
                  - light.kitchen_light_spot_oven
                  - light.kitchen_light_spot_sink
                  - light.kitchen_light_spot_fridge
                  - light.kitchen_light_spot_hallway

        - conditions:
            - condition: trigger
              id: light_on
            - condition: state
              entity_id: binary_sensor.someone_home
              state: "off"
          sequence:
            - action: light.turn_off
              data:
                transition: 1
              target:
                entity_id: light.kitchen_lights

        - conditions:
            - condition: trigger
              id: rotary
          sequence:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: event.kitchen_switch_rotary
                      attribute: event_type
                      state: clock_wise
                    - condition: state
                      entity_id: binary_sensor.kitchen_light
                      state: "off"
                  sequence:
                    - action: light.turn_on
                      data:
                        brightness_pct: "{{ (state_attr('event.kitchen_switch_rotary', 'steps')|float / 3.60)|round(0) }}"
                      target:
                        entity_id: light.kitchen_lights
                - conditions:
                    - condition: state
                      entity_id: event.kitchen_switch_rotary
                      attribute: event_type
                      state: clock_wise
                  sequence:
                    - action: light.turn_on
                      data:
                        brightness_step_pct: "{{ (state_attr('event.kitchen_switch_rotary', 'steps')|float / 3.60)|round(0) }}"
                      target:
                        entity_id: "{{ state_attr('light.kitchen_lights', 'entity_id') |  expand() | selectattr('state', 'eq', 'on') |  map(attribute='entity_id') | list }}"
              default:
                - action: light.turn_on
                  data:
                    brightness_step_pct: "{{ (state_attr('event.kitchen_switch_rotary', 'steps')|float / -3.60)|round(0) }}"
                  target:
                    entity_id: "{{ state_attr('light.kitchen_lights', 'entity_id') | expand() | selectattr('state', 'eq', 'on') | map(attribute='entity_id') | list }}      "
