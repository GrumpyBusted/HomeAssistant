- id: "1771522267634"
  alias: Soveværelse sover
  description: |
    Styring af timer til soveværelse sover
  mode: queued
  max: 10
  trace:
    stored_traces: 20

  triggers:
    - trigger: state
      entity_id: binary_sensor.bedroom_sleeping
      from: "off"
      to: "on"
      id: sleeping

    - trigger: state
      entity_id: binary_sensor.bedroom_sleeping
      from: "on"
      to: "off"
      id: waking

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: sleeping
          sequence:
            - action: timer.start
              target:
                entity_id: timer.bedroom_sleeping_timer
              data:
                duration: "00:30:00"

        - conditions:
            - condition: trigger
              id: waking
          sequence:
            - action: timer.cancel
              target:
                entity_id: timer.bedroom_sleeping_timer
