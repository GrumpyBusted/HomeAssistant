- id: "1740170480608"
  alias: Hjem todo Frient røgalarm
  description: |
    Kontroller batteri status på Frient røgalarm
  mode: restart
  trace:
    stored_traces: 30

  triggers:
    - trigger: numeric_state
      entity_id:
        - sensor.charlies_room_smoke_detector_battery
        - sensor.emils_room_smoke_detector_battery
        - sensor.bedroom_smoke_detector_battery
        - sensor.garage_smoke_detector_battery
        - sensor.storage_smoke_detector_battery
        - sensor.technic_room_smoke_detector_battery
      below: 10
      for: 00:03:00

    - trigger: numeric_state
      entity_id:
        - sensor.charlies_room_smoke_detector_battery
        - sensor.emils_room_smoke_detector_battery
        - sensor.bedroom_smoke_detector_battery
        - sensor.garage_smoke_detector_battery
        - sensor.storage_smoke_detector_battery
        - sensor.technic_room_smoke_detector_battery
      above: 70
      for: 00:03:00

    - trigger: time
      at: 03:07:00

  conditions: []

  actions:
    - variables:
        sensors:
          - entity_id: sensor.charlies_room_smoke_detector_battery
          - entity_id: sensor.emils_room_smoke_detector_battery
          - entity_id: sensor.bedroom_smoke_detector_battery
          - entity_id: sensor.garage_smoke_detector_battery
          - entity_id: sensor.storage_smoke_detector_battery
          - entity_id: sensor.technic_room_smoke_detector_battery
    - repeat:
        for_each: "{{ sensors }}"
        sequence:
          - action: script.create_todo_battery_task
            data:
              entity_id: "{{ repeat.item.entity_id }}"
