- id: '1763846508906'
  alias: Bryggers lås
  description: Automatik til at låse bryggersdøren op og i baseret på hvem der er
    hjemme
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.someone_home
    from: 'on'
    to: 'off'
    id: no_one_home
  - trigger: state
    entity_id:
    - binary_sensor.everyone_sleeping
    from: 'off'
    to: 'on'
    id: sleeping
  - trigger: numeric_state
    entity_id: input_number.bedroom_blind_position
    below: 1
    id: bedroom_blind_down
  - trigger: state
    entity_id:
    - timer.utility_room_lock_timer
    to: idle
    id: auto_locking_expired
  conditions: []
  actions:
  - action: homeassistant.update_entity
    data:
      entity_id: lock.utility_room_lock
  - delay:
      seconds: 3
  - choose:
    - conditions:
      - condition: trigger
        id:
        - no_one_home
        - sleeping
      - condition: state
        entity_id: lock.utility_room_lock
        state: unlocked
      sequence:
      - action: lock.lock
        metadata: {}
        data: {}
        target:
          entity_id: lock.utility_room_lock
      - action: timer.start
        metadata: {}
        data:
          duration: 00:00:10
        target:
          entity_id: timer.utility_room_lock_timer
    - conditions:
      - condition: trigger
        id:
        - auto_locking_expired
      - condition: state
        entity_id: lock.utility_room_lock
        state:
        - unlocked
      - condition: state
        entity_id: binary_sensor.house_sitter_home
        state: 'off'
      sequence:
      - action: script.push_notification
        data:
          type: critical
          title: Advarsel
          message: Bryggers døren kunne ikke låses automatisk!
          id: utility_room_lock_auto_warning
          recipient: home
          persistent: false
  mode: queued
  max: 10
  trace:
    stored_traces: 100
