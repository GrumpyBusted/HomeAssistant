- id: "1736082177257"
  alias: Charlies værelse lys
  description: |
    Automatik til at styre lys på Charlies værelse
  mode: queued
  max: 10
  trace:
    stored_traces: 20

  triggers:
    - trigger: state
      entity_id: event.charlies_room_switch_button_1
      attribute: event_type
      to: short_release
      id: button_1_short

    - trigger: state
      entity_id: event.charlies_room_switch_button_1
      attribute: event_type
      to: long_release
      id: button_1_long

    - trigger: state
      entity_id: event.charlies_room_switch_button_2
      attribute: event_type
      to: short_release
      id: button_2_short

    - trigger: state
      entity_id: event.charlies_room_switch_button_2
      id: button_2

    - trigger: state
      entity_id: event.charlies_room_switch_button_3
      attribute: event_type
      to: initial_press
      id: button_3

    - trigger: state
      entity_id: event.charlies_room_switch_button_4
      attribute: event_type
      to: initial_press
      id: button_4

    - trigger: state
      entity_id: binary_sensor.charlie_home
      from: "on"
      to: "off"
      id: charlie_leaving

    - trigger: state
      entity_id: binary_sensor.charlie_home
      from: "off"
      to: "on"
      id: charlie_home

    - trigger: state
      entity_id: binary_sensor.charlies_room_light
      from: "off"
      to: "on"
      for: 00:15:00
      id: lights_on

    - trigger: time
      at: input_datetime.charlie_bedtime_alarm
      id: bedtime

    - trigger: time
      at: input_datetime.charlie_wake_up_alarm
      id: wake_up

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: button_1_short
          sequence:
            - parallel:
                - action: light.turn_on
                  target:
                    entity_id: light.charlies_room_smart_plug_string_lights

                - action: light.turn_on
                  target:
                    entity_id:
                      - light.charlies_room_light_desk_right
                      - light.charlies_room_light_desk_mid
                      - light.charlies_room_light_desk_left
                  data:
                    transition: 1
                    brightness_pct: 80

        - conditions:
            - condition: trigger
              id: button_1_long
          sequence:
            - parallel:
                - action: light.turn_on
                  target:
                    entity_id: light.charlies_room_smart_plug_string_lights

                - action: light.turn_on
                  target:
                    entity_id:
                      - light.charlies_room_light_desk_right
                      - light.charlies_room_light_desk_mid
                      - light.charlies_room_light_desk_left
                  data:
                    transition: 1
                    brightness_pct: 100

                - action: light.turn_on
                  target:
                    entity_id:
                      - light.charlies_room_light_dresser
                      - light.charlies_room_light_bed_lamp
                  data:
                    transition: 1
                    color_temp_kelvin: 2700
                    brightness_pct: 100

        - conditions:
            - condition: trigger
              id: button_2_short
          sequence:
            - action: light.toggle
              target:
                entity_id:
                  - light.charlies_room_light_desk_right
                  - light.charlies_room_light_desk_mid
                  - light.charlies_room_light_desk_left
              data:
                transition: 1
                brightness_pct: 80

        - conditions:
            - condition: trigger
              id: button_2
            - condition: state
              entity_id: event.charlies_room_switch_button_2
              attribute: event_type
              state: repeat
          sequence:
            - action: script.charlies_room_light_desk_adjust
              data:
                brightness_step: 25

        - conditions:
            - condition: trigger
              id: button_3
          sequence:
            - action: light.toggle
              target:
                entity_id: light.charlies_room_smart_plug_string_lights

        - conditions:
            - condition: trigger
              id: button_4
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.charlies_room_lights
              data:
                transition: 1

        - conditions:
            - condition: trigger
              id:
                - charlie_leaving
                - lights_on
            - condition: state
              entity_id: binary_sensor.charlie_home
              state: "off"
            - condition: state
              entity_id: input_boolean.house_sitter
              state: "off"
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.charlies_room_lights
              data:
                transition: 1

        - conditions:
            - condition: trigger
              id:
                - charlie_home
                - wake_up
            - condition: state
              entity_id: binary_sensor.charlie_home
              state: "on"
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.charlies_room_smart_plug_string_lights

        - conditions:
            - condition: trigger
              id: bedtime
            - condition: state
              entity_id: binary_sensor.charlie_home
              state: "on"
          sequence:
            - action: light.turn_off
              target:
                entity_id:
                  - light.charlies_room_light_desk_left
                  - light.charlies_room_light_desk_mid
                  - light.charlies_room_light_desk_right
                  - light.charlies_room_light_dresser
              data:
                transition: 10
