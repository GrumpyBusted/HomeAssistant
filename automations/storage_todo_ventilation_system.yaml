- id: "1771357000655"
  alias: Loftrum todo ventilationsanlæg
  description: Opret todo opgaver vedrørende filter m.m. på ventilationsanlæget i loftrummet
  mode: queued
  max: 10
  trace:
    stored_traces: 30

  triggers:
    - trigger: numeric_state
      entity_id: sensor.storage_ventilation_system_days_left_until_filter_change
      below: 1

    - trigger: numeric_state
      entity_id: sensor.storage_ventilation_system_days_left_until_filter_change
      above: 1

    - trigger: state
      entity_id: climate.storage_ventilation_system_ventilation
      attribute: fan_mode
      to:
        - "off"

    - trigger: state
      entity_id: climate.storage_ventilation_system_ventilation
      attribute: fan_mode
      from:
        - "off"

    - trigger: time
      at: "03:19:00"

    - trigger: event
      event_type: todo_item_completed
      event_data:
        related: sensor.storage_ventilation_system_days_left_until_filter_change
      id: todo_completed

  conditions: []

  actions:
    - if:
        - condition: trigger
          id: todo_completed
      then:
        - action: button.press
          target:
            entity_id: button.storage_ventilation_system_reset_filter

        - action: input_boolean.toggle
          target:
            entity_id: input_boolean.storage_ventilation_system_replace_pollen_filter_next
      else:
        - action: script.create_todo_task
          data:
            subject: Udskift filter på ventilationsanlægget
            description: >
              Udskift
              {% if is_state('input_boolean.storage_ventilation_system_replace_pollen_filter_next','on') %}
                både Standardfilter (tynde blå) og Pollenfilter (tykke hvide)
              {% else %}
                Standardfilter (tynde blå)
              {% endif %}
              på ventilationsanlægget på loftet.
              Husk at nulstille filter alarm til 90 dage.
            related_entity_id: sensor.storage_ventilation_system_days_left_until_filter_change
            entity_id: todo.todo_smart_todo
            is_active: "{{ states('sensor.storage_ventilation_system_days_left_until_filter_change') | int(99) < 1 }}"

    - variables:
        message: >
          {% set raw_list = states('sensor.storage_ventilation_system_active_alarm_list') %}
          {% set raw_count = states('sensor.storage_ventilation_system_active_alarm_count') | int(0) %}
          {% set alarms = raw_list.split('\n') | map('trim') | reject('equalto','') | list %}
          {% set filtered = alarms | reject('search','Change filter') | list %}
          {% set removed = alarms | length - filtered | length %}
          {% set new_count = raw_count - removed %}
          {% if new_count < 0 %}
            {% set new_count = 0 %}
          {% endif %}
          {% if new_count > 0 and filtered | length > 0 %}
            Antal alarmer: {{ new_count }} Liste: {{ filtered | join('\n') }}
          {% endif %}

    - action: script.create_todo_task
      data:
        subject: Alarm på ventilationsanlægget
        description: >
          Der er en eller flere alarmer på ventilationsanlægget.
          {{ message }}
        related_entity_id: sensor.storage_ventilation_system_days_left_until_filter_change
        entity_id: todo.todo_smart_todo
        is_active: "{{ message | trim | length > 0 }}"

    - action: script.create_todo_task
      data:
        subject: Tænd ventilationsanlægget
        description: Ventilationsanlægget på loftet er slukket, tænd det igen.
        related_entity_id: climate.storage_ventilation_system_ventilation
        entity_id: todo.todo_smart_todo
        is_active: "{{ is_state_attr('climate.storage_ventilation_system_ventilation','fan_mode','off') }}"