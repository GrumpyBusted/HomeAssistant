- id: '1768136225501'
  alias: Stue robotstøvsuger tøm støvbeholder
  description: Tøm støvbeholder på robotstøvsuger
  triggers:
  - trigger: state
    entity_id:
    - sensor.living_room_robot_vacuum_total_cleaning_time
  - trigger: state
    entity_id: vacuum.living_room_robot_vacuum
    to: docked
  - trigger: state
    entity_id: timer.living_room_robot_vacuum_timer
    to: idle
  - trigger: state
    entity_id: binary_sensor.someone_sleeping
    to: 'off'
  - trigger: state
    entity_id: binary_sensor.bedroom_sleeping
    to: 'off'
  - trigger: state
    entity_id: binary_sensor.living_room_media_player
    to: 'off'
  - trigger: state
    entity_id: binary_sensor.living_room_door_sensor_door
    to: 'off'
  - trigger: state
    entity_id: input_select.living_room_robot_vacuum_current_cleaning
    to: none
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ states(''sensor.living_room_robot_vacuum_time_since_empty_dust_bin'')|int
          > 10 }}

          '
      - condition: state
        entity_id: vacuum.living_room_robot_vacuum
        state: docked
      - condition: state
        entity_id: timer.living_room_robot_vacuum_timer
        state: idle
      - condition: state
        entity_id: input_select.living_room_robot_vacuum_current_cleaning
        state: none
      - condition: state
        entity_id: binary_sensor.bedroom_sleeping
        state: 'off'
      - condition: state
        entity_id: binary_sensor.living_room_media_player
        state: 'off'
      sequence:
      - action: script.living_room_robot_vacuum_empty_dust_bin
        metadata: {}
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ states(''sensor.living_room_robot_vacuum_time_since_empty_dust_bin'')|int
          > 10 }}

          '
      - condition: state
        entity_id: vacuum.living_room_robot_vacuum
        state: docked
      - condition: state
        entity_id: timer.living_room_robot_vacuum_timer
        state: idle
      - condition: state
        entity_id: input_select.living_room_robot_vacuum_current_cleaning
        state: none
      - condition: state
        entity_id: binary_sensor.someone_sleeping
        state: 'off'
      - condition: state
        entity_id: binary_sensor.living_room_door_sensor_door
        state: 'on'
      - condition: state
        entity_id: binary_sensor.living_room_media_player
        state: 'off'
      sequence:
      - action: script.living_room_robot_vacuum_empty_dust_bin
        metadata: {}
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ states(''sensor.living_room_robot_vacuum_time_since_empty_dust_bin'')|int
          > 30 }}

          '
      - condition: state
        entity_id: vacuum.living_room_robot_vacuum
        state: docked
      - condition: state
        entity_id: timer.living_room_robot_vacuum_timer
        state: idle
      - condition: state
        entity_id: input_select.living_room_robot_vacuum_current_cleaning
        state: none
      sequence:
      - action: script.living_room_robot_vacuum_empty_dust_bin
        metadata: {}
        data: {}
  mode: queued
  max: 10
  trace:
    stored_traces: 100
