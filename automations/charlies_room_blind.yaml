- id: "1770229021068"
  alias: Charlies værelse rullegardin
  description: Automatik for rullegardin på Charlies værelse
  mode: queued
  max: 10
  trace:
    stored_traces: 50

  triggers:
    - trigger: device
      device_id: 937baa924ab8fff3bfbd80513dde21d2
      domain: zha
      type: remote_button_short_press
      subtype: open
      id: open_short_pressed

    - trigger: device
      device_id: 937baa924ab8fff3bfbd80513dde21d2
      domain: zha
      type: remote_button_short_press
      subtype: close
      id: close_short_pressed

    - trigger: state
      entity_id: binary_sensor.charlie_home
      to: "on"
      id: charlie_home

    - trigger: state
      entity_id: binary_sensor.charlie_home
      to: "off"
      id: charlie_leaving

    - trigger: time
      at: "12:00:00"
      id: noon

    - trigger: time
      at: input_datetime.charlie_bedtime_alarm
      id: bedtime

    - trigger: time
      at:
        entity_id: input_datetime.charlie_wake_up_alarm
        offset: "01:00:00"
      id: wake_up

    - trigger: state
      entity_id: binary_sensor.home_outside_light
      to: "off"
      id: dark_outside

    - trigger: state
      entity_id: binary_sensor.home_outside_light
      to: "on"
      id: light_outside

    - trigger: state
      entity_id: binary_sensor.charlies_room_window
      to: "off"

    - trigger: state
      entity_id: binary_sensor.charlies_room_window
      to: "on"
      id: window_opened

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - open_short_pressed
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.charlies_room_blind_position
              data:
                value: 100

        - conditions:
            - condition: trigger
              id:
                - close_short_pressed
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.charlies_room_blind_position
              data:
                value: 0

        - conditions:
            - condition: state
              entity_id: binary_sensor.house_sitter_home
              state: "on"
          sequence: []

        - conditions:
            - condition: trigger
              id:
                - charlie_leaving
                - charlie_home
                - noon
            - condition: state
              entity_id: binary_sensor.home_outside_light
              state: "on"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.charlies_room_blind_position
              data:
                value: 100

        - conditions:
            - condition: trigger
              id:
                - wake_up
            - condition: state
              entity_id: binary_sensor.home_outside_light
              state: "on"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.charlies_room_blind_position
              data:
                value: 100

        - conditions:
            - condition: trigger
              id:
                - light_outside
            - condition: template
              value_template: >
                {% set n = now() %}
                {% set w = states('input_datetime.charlie_wake_up_alarm') | as_datetime | as_local + timedelta(hours=1) %}
                {{ n.date() == w.date() and n.time() >= w.time() }}
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.charlies_room_blind_position
              data:
                value: 100

        - conditions:
            - condition: trigger
              id:
                - dark_outside
                - charlie_leaving
                - charlie_home
                - bedtime
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.charlies_room_blind_position
              data:
                value: 0

    - variables:
        position: "{{ states('input_number.charlies_room_blind_position') | int(0) }}"

    - if:
        - condition: state
          entity_id: binary_sensor.charlies_room_window
          state: "on"
        - condition: template
          value_template: "{{ not(trigger.id == 'close_short_pressed' and (state_attr('cover.charlies_room_blind','current_position') | float(999)) <= 20) }}"
      then:
        - variables:
            position: "{{ [position | int, 20] | max }}"

    - wait_template: "{{ states('cover.charlies_room_blind') not in ['opening', 'closing'] }}"
      timeout: "00:00:30"
      continue_on_timeout: true

    - action: system_log.write
      data:
        level: debug
        message: |
          Trigger: {{ trigger.id }}
          Current position: {{ state_attr('cover.charlies_room_blind', 'current_position') }}
          Desired position: {{ states('input_number.charlies_room_blind_position') }}
          New position: {{ position }}

    - choose:
        - conditions:
            - condition: trigger
              id:
                - open_long_pressed
                - close_long_pressed
          sequence: []

        - conditions:
            - condition: template
              value_template: "{{ position | int(0) == 100 }}"
            - condition: numeric_state
              entity_id: cover.charlies_room_blind
              attribute: current_position
              below: 100
          sequence:
            - action: cover.open_cover
              target:
                entity_id: cover.charlies_room_blind

        - conditions:
            - condition: template
              value_template: "{{ position | int(0) == 0 }}"
            - condition: numeric_state
              entity_id: cover.charlies_room_blind
              attribute: current_position
              above: 0
          sequence:
            - action: cover.close_cover
              target:
                entity_id: cover.charlies_room_blind

        - conditions:
            - condition: template
              value_template: "{{ state_attr('cover.charlies_room_blind', 'current_position') | int(0) != position | int(0) }}"
          sequence:
            - action: cover.set_cover_position
              target:
                entity_id: cover.charlies_room_blind
              data:
                position: "{{ position }}"

    - wait_template: "{{ states('cover.charlies_room_blind') not in ['opening', 'closing'] }}"
      timeout: "00:00:30"
      continue_on_timeout: true