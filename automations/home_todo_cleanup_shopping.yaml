- id: "1740165836750"
  alias: Hjem Todo oprydning indkøbsseddel
  description: |
    Automatik der sletter afsluttede opgaver på indkøbsseddel
  mode: restart
  trace:
    stored_traces: 30

  triggers:
    - trigger: time
      at: 02:00:00

  conditions: []

  actions:
    - action: script.cleanup_todo_tasks
      data:
        entity_id: todo.todo_shopping_list
        date: "{{ (now() - timedelta(days=2)).date() }}"
      response_variable: response
    - action: system_log.write
      data:
        level: info
        message: "Deleted: {{ response.deleted }}"
