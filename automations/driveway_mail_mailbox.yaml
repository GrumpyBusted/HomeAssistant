  - id: 994BC43F-4474-434B-8E76-554C1B30F52D
    alias: Indkørsel mail postkasse
    description: |
      Send mail når der er post i postkasse
    mode: single
    trace:
      stored_traces: 30

    triggers:
      - trigger: state
        entity_id: binary_sensor.driveway_mailbox_130a_vibration_sensor
        to: "on"

    conditions: []

    actions:
      - action: notify.mail
        data:
          title: Der er post
          message: |-
            Der er registeret bevægelse ved postkassen ved vejen og der kan derfor være post i postkassen (130A).
          data:
            to: "anders@busted-janum.dk"  
