- id: "1735847242174"
  alias: Terrasse lys
  description: |
    Automatik til at styre lys på terrassen
  mode: queued
  max: 10
  trace:
    stored_traces: 50

  triggers:
    - trigger: state
      entity_id: event.patio_switch_button_1
      attribute: event_type
      to: short_release
      id: button_1_short

    - trigger: state
      entity_id: event.patio_switch_button_1
      attribute: event_type
      to: long_release
      id: button_1_long

    - trigger: state
      entity_id: event.patio_switch_button_2
      id: button_2

    - trigger: state
      entity_id: event.patio_switch_button_3
      id: button_3

    - trigger: state
      entity_id: event.patio_switch_button_4
      attribute: event_type
      to: initial_press
      id: button_4

    - trigger: state
      entity_id: binary_sensor.patio_door
      from: "off"
      to: "on"
      id: opened

    - trigger: state
      entity_id: lock.patio_lock
      to: locked
      id: locked

    - trigger: state
      entity_id: binary_sensor.everyone_sleeping
      from: "off"
      to: "on"
      id: sleeping

    - trigger: state
      entity_id: binary_sensor.someone_home
      from: "on"
      to: "off"
      id: no_one_home

    - trigger: state
      entity_id: binary_sensor.patio_light
      from: "off"
      to: "on"
      for: 00:10:00
      id: lights_on

    - trigger: state
      entity_id: input_select.patio_light_scene
      to: Jul
      id: christmas_scene

    - trigger: state
      entity_id: input_select.patio_light_scene
      to: Auto
      id: auto_scene

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: button_1_short
          sequence:
            - action: light.toggle
              target:
                entity_id: light.patio_lights
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 60

        - conditions:
            - condition: trigger
              id: button_1_long
          sequence:
            - action: light.toggle
              target:
                entity_id: light.patio_lights
              data:
                transition: 1
                color_temp_kelvin: 3000
                brightness_pct: 100

        - conditions:
            - condition: trigger
              id: button_2
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.patio_lights
              data:
                transition: 0.5
                brightness_step_pct: 10

        - conditions:
            - condition: trigger
              id: button_3
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.patio_lights
              data:
                transition: 0.5
                brightness_step_pct: -10

        - conditions:
            - condition: trigger
              id: button_4
          sequence:
            - action: light.turn_on
              target:
                entity_id:
                  - light.patio_light_dining_table
                  - light.patio_light_sofa
              data:
                transition: 1
                brightness_pct: 40
                rgb_color: [253, 160, 83]

            - action: light.turn_on
              target:
                entity_id: light.patio_light_main
              data:
                transition: 1
                brightness_pct: 40
                rgb_color: [240, 106, 92]

            - action: light.turn_on
              target:
                entity_id: light.patio_light_bar
              data:
                transition: 1
                brightness_pct: 40
                rgb_color: [199, 83, 253]

        - conditions:
            - condition: trigger
              id: opened
            - condition: state
              entity_id: binary_sensor.patio_light
              state: "off"
            - condition: state
              entity_id: binary_sensor.home_outside_light
              state: "off"
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.patio_light_main
              data:
                transition: 1
                color_temp_kelvin: 2700
                brightness_pct: 60

        - conditions:
            - condition: trigger
              id:
                - no_one_home
                - locked
                - sleeping
                - auto_scene
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.patio_lights
              data:
                transition: 1

        - conditions:
            - condition: trigger
              id: lights_on
            - condition: or
              conditions:
                - condition: numeric_state
                  entity_id: sensor.home_outside_current_temperature
                  below: 15
                - condition: state
                  entity_id: binary_sensor.someone_home
                  state: "off"
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.patio_lights
              data:
                transition: 0

        - conditions:
            - condition: trigger
              id: christmas_scene
          sequence:
            - action: scene.turn_on
              target:
                entity_id: scene.patio_light_christmas
