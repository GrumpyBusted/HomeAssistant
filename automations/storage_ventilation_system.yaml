- id: "1768156511533"
  alias: Loftrum ventilationsanlæg
  description: Styring af varme genveks ventilationsanlæg
  mode: queued
  max: 10
  trace:
    stored_traces: 50

  triggers:
    - trigger: state
      entity_id: sensor.home_target_maximum_temperature

    - trigger: state
      entity_id: sensor.storage_ventilation_desired_level

    - trigger: state
      entity_id: binary_sensor.someone_home

    - trigger: state
      entity_id: binary_sensor.everyone_sleeping

  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.storage_ventilation_system_ventilation
          attribute: fan_mode
          state:
            - "off"

  actions:
    - action: number.set_value
      target:
        entity_id: number.storage_ventilation_system_temperature_target
      data:
        value: "{{ states('sensor.home_target_maximum_temperature') }}"

    - choose:
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: binary_sensor.someone_home
                  state: "off"
                - condition: state
                  entity_id: binary_sensor.everyone_sleeping
                  state: "on"
                - condition: state
                  entity_id: sensor.storage_ventilation_desired_level
                  state: "1"
          sequence:
            - action: climate.set_fan_mode
              target:
                entity_id: climate.storage_ventilation_system_ventilation
              data:
                fan_mode: low

            - action: select.select_option
              target:
                entity_id: select.storage_ventilation_system_fan_level
              data:
                option: "1"

        - conditions:
            - condition: state
              entity_id: sensor.storage_ventilation_desired_level
              state: "4"
          sequence:
            - action: climate.set_fan_mode
              target:
                entity_id: climate.storage_ventilation_system_ventilation
              data:
                fan_mode: high

            - action: select.select_option
              target:
                entity_id: select.storage_ventilation_system_fan_level
              data:
                option: "4"

        - conditions:
            - condition: state
              entity_id: sensor.storage_ventilation_desired_level
              state: "3"
          sequence:
            - action: climate.set_fan_mode
              target:
                entity_id: climate.storage_ventilation_system_ventilation
              data:
                fan_mode: medium

            - action: select.select_option
              target:
                entity_id: select.storage_ventilation_system_fan_level
              data:
                option: "3"

        - conditions:
            - condition: state
              entity_id: sensor.storage_ventilation_desired_level
              state: "2"
          sequence:
            - action: climate.set_fan_mode
              target:
                entity_id: climate.storage_ventilation_system_ventilation
              data:
                fan_mode: middle

            - action: select.select_option
              target:
                entity_id: select.storage_ventilation_system_fan_level
              data:
                option: "2"