- id: "1770473789903"
  alias: Hjem overvåg enheder
  description: |
    Overvåg alle enheder og sikre de er tilgængelige
  mode: single
  trace:
    stored_traces: 50

  triggers:
    - trigger: homeassistant
      event: start
      id: started

    - trigger: state
      entity_id: timer.home_monitor_entities_timer
      from: active
      to: idle

    - trigger: time
      at: 04:01:00

  conditions: []

  actions:
    - if:
        - condition: trigger
          id: started
      then:
        - action: timer.start
          target:
            entity_id: timer.home_monitor_entities_timer
          data:
            duration:
              minutes: 5
      else:
        - action: timer.cancel
          target:
            entity_id: timer.home_monitor_entities_timer
        - variables:
            exclude_entities:
              - light.living_room_smart_plug_christmas_elf_house
              - light.charlies_room_light_bed_lamp
              - light.charlies_room_light_dresser
              - sensor.living_room_printer_black_bk
              - sensor.living_room_printer_black_pgbk
              - sensor.living_room_printer_cyan
              - sensor.living_room_printer_magenta
              - sensor.living_room_printer_photo_blue
              - sensor.living_room_printer_yellow
            entities: >-
              {% set unavailable = states
                | rejectattr('domain', 'in', ['button', 'event', 'update'])
                | selectattr('state', 'eq', 'unavailable')
                | map(attribute='entity_id')
                | list
              %}
              
              {% set unknown = states
                | selectattr('domain', 'in', [
                    'media_player',
                    'sensor',
                    'binary_sensor',
                    'climate',
                    'cover',
                    'lock'
                  ])
                | selectattr('state', 'eq', 'unknown')
                | map(attribute='entity_id')
                | list
              %}
              
              {% set entities = (unavailable + unknown)
                | reject('in', exclude_entities)
                | unique
                | list
              %}
              
              {{ entities | to_json }}

            message: |-
              {% set ns = namespace(result={}) %}

              {% for e in entities | trim | from_json %}
                {% set dev_id = device_id(e) if device_id(e) else '[NO_DEVICE]' %}

                {% if dev_id not in ns.result %}
                  {% if dev_id == '[NO_DEVICE]' %}
                    {% set dev_name = '[NO_DEVICE]' %}
                    {% set dev_area_name = '' %}
                  {% else %}
                    {% set dev_name =
                      device_attr(dev_id, 'name_by_user')
                      if device_attr(dev_id, 'name_by_user')
                      else device_attr(dev_id, 'name')
                    %}
                    {% set dev_area_name = area_name(device_attr(dev_id, 'area_id')) %}
                  {% endif %}

                  {% set ns.result = dict(
                    ns.result,
                    **{
                      dev_id: {
                        "device_id": dev_id,
                        "name": dev_name,
                        "area": dev_area_name,
                        "entities": []
                      }
                    }
                  ) %}
                {% endif %}

                {% set ent_obj = {
                  "entity_id": e,
                  "friendly_name": state_attr(e, 'friendly_name'),
                  "state": states(e),
                  "last_changed": states[e].last_changed.isoformat()
                } %}

                {% set ns.result = dict(
                  ns.result,
                  **{
                    dev_id: dict(
                      ns.result[dev_id],
                      **{
                        "entities": ns.result[dev_id]["entities"] + [ent_obj]
                      }
                    )
                  }
                ) %}
              {% endfor %}

              {% set devices = ns.result.values() | list %}

              count_devices: {{ devices | count }}
              count_entities: {{ entities | count }}
              devices:
              {% for dev in devices %}
                - device_id: "{{ dev.device_id }}"
                  name: "{{ dev.name }}"
                  area: "{{ dev.area }}"
                  entities:
                  {% for ent in dev.entities %}
                    - entity_id: "{{ ent.entity_id }}"
                      friendly_name: "{{ ent.friendly_name }}"
                      state: "{{ ent.state }}"
                      last_changed: "{{ ent.last_changed }}"
                  {% endfor %}
              {% endfor %}
        - if:
            - condition: template
              value_template: |-
                {{ entities | trim | from_json | length > 0}}
          then:
            - action: script.push_notification
              data:
                type: info
                recipient: none
                persistent: true
                id: home_assistant_monitor_unavailable_entities
                title: "{{ entities | trim | from_json | length }} sensorer er ikke tilgængelige i HomeAssistant"
                message: "{{ message }}"
