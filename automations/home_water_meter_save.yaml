- id: "1764966963610"
  alias: Hjem vand måler aflæs
  description: |
    Aflæs vand forbrug og gem i CSV fil
  mode: single
  trace:
    stored_traces: 30

  triggers:
    - trigger: time
      at: 02:00:00

  conditions:
    - condition: template
      value_template: |-
        {{ now().day == 1 }}

  actions:
    - action: shell_command.append_to_file
      data:
        line: "{{ (state_attr('sensor.home_water_meter', 'timestamp') | as_datetime).strftime('%Y-%m-%dT%H:%M:%S') }},{{ state_attr('sensor.home_water_meter', 'total_m3') }}"
        file: /config/data/meter_reading_water.csv
